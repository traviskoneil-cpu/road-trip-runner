  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:#FFF8EC;border:none;color:#1F3A5F;border-radius:50%;width:36px;height:36px;font-size:15px;font-weight:bold;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.2);\">✕<\u002Fbutton>\n        <div style=\"position:absolute;top:14px;left:0;right:0;display:flex;justify-content:flex-end;padding:0 18px;pointer-events:none;\">\n          <div style=\"text-align:right;background:rgba(255,248,236,.12);border-radius:14px;padding:6px 14px;\">\n            <div style=\"font-size:24px;font-weight:bold;color:#FFF8EC;\">12,480<\u002Fdiv>\n            <div style=\"font-size:11px;color:#FFD23F;font-weight:bold;\">14x combo<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;\">\n          <div style=\"display:flex;gap:10px;\">\n            <div style=\"width:70px;height:280px;background:rgba(255,107,74,.15);border-radius:14px;position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;left:50%;top:70%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:#FF6B4A;animation:pulse 1s infinite;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:70px;height:280px;background:rgba(255,210,63,.15);border-radius:14px;position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;left:50%;top:40%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:#FFD23F;\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:70px;height:280px;background:rgba(63,182,199,.15);border-radius:14px;position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;left:50%;top:70%;transform:translateX(-50%);width:38px;height:38px;border-radius:50%;background:#3FB6C7;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#8FA6C0;letter-spacing:1px;margin-top:8px;\">[MOCK] gameplay canvas — {{ selectedSongTitle }} · {{ selectedDiffLabel }}<\u002Fdiv>\n          <button onclick=\"{{ endSongMock }}\" style=\"margin-top:8px;background:#FFD23F;border:none;color:#1F3A5F;font-size:12px;font-weight:bold;letter-spacing:1px;padding:9px 18px;border-radius:20px;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.2);\">[MOCK] END SONG →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== RESULT ===== -->\n    <sc-if value=\"{{ isResult }}\">\n      <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;background:linear-gradient(180deg,#BDEBFA 0%,#EAF7EE 300px);\">\n        {{ topBarHome }}\n        <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;gap:4px;\">\n          <div style=\"font-size:92px;font-weight:bold;line-height:1;color:{{ rankColor }};animation:popIn .3s cubic-bezier(.34,1.56,.64,1);\">{{ resultRank }}<\u002Fdiv>\n          <div style=\"font-size:20px;letter-spacing:.5px;font-weight:bold;color:#1F3A5F;\">{{ selectedSongTitle }}<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:#FF6B4A;font-weight:bold;margin-bottom:10px;\">{{ selectedDiffLabel }}<\u002Fdiv>\n          <div style=\"font-size:14px;color:#1F3A5F;opacity:.9;line-height:1.9;\">\n            Score <b>12,480<\u002Fb><br>Accuracy <b>91%<\u002Fb><br>\n            <span style=\"color:#3FB6C7;font-weight:bold;\">Perfect 44<\u002Fspan> · <span style=\"color:#E8A200;font-weight:bold;\">Good 6<\u002Fspan> · <span style=\"color:#FF6B4A;font-weight:bold;\">Miss 2<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showUnlock }}\">\n            <div style=\"color:#2E9E4F;font-weight:bold;letter-spacing:.5px;font-size:16px;margin:10px 0 2px;\">🔓 {{ unlockLabel }} UNLOCKED FOR THIS SONG!<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;\">\n            <button onclick=\"{{ retry }}\" style=\"background:#FF6B4A;color:#fff;border:none;font-size:15px;font-weight:bold;padding:11px 26px;border-radius:26px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 0 rgba(0,0,0,.18);\">RETRY<\u002Fbutton>\n            <button onclick=\"{{ backToSelect }}\" style=\"background:#FFF8EC;border:none;color:#1F3A5F;font-size:15px;font-weight:bold;padding:11px 24px;border-radius:26px;cursor:pointer;letter-spacing:.5px;box-shadow:0 4px 0 rgba(0,0,0,.12);\">SONG LIST<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TRANSITION WIPE ===== -->\n    <sc-if value=\"{{ showWipe }}\">\n      <div style=\"position:absolute;inset:0;z-index:50;background:{{ wipeColor }};display:flex;align-items:center;justify-content:center;transform:{{ wipeTransform }};transition:transform .22s cubic-bezier(.4,0,.2,1);\">\n        <div style=\"font-size:15px;font-weight:bold;letter-spacing:2px;color:#1F3A5F;display:flex;align-items:center;gap:10px;\">\n          <span style=\"display:inline-block;width:16px;height:16px;border:2px solid rgba(31,58,95,.25);border-top-color:#1F3A5F;border-radius:50%;animation:spin .7s linear infinite;\"><\u002Fspan>\n          {{ wipeLabel }}\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n\n  <!-- NOTES PANEL -->\n  <div style=\"width:300px;max-width:100%;color:#f0f0f0;font-size:12.5px;line-height:1.7;\">\n    <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8b93ad;font-weight:bold;margin-bottom:10px;\">Design Notes — {{ noteHeading }}<\u002Fdiv>\n    <div style=\"background:#1a2138;border:1px solid #29314f;border-radius:12px;padding:14px;\">{{ noteBody }}<\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  state = {\n    screen: 'hub',\n    expanded: null,\n    songId: null,\n    diff: null,\n    wipe: null,\n    era: '90s',\n  };\n\n  ERAS = ['70s','80s','90s','00s'];\n  STATION = {\n    '70s': { name:'KWAX', tag:'Classic Rock' },\n    '80s': { name:'KRZR', tag:'Synth Pop' },\n    '90s': { name:'KDRT', tag:'90s Hits' },\n    '00s': { name:'HITZ', tag:'2000s Pop' },\n  };\n\n  SONGS = [\n    { id:'s1', title:'Neon Nights',   band:'The Radicals',  era:'80s', diffs:{ easy:{grade:'A'}, medium:{grade:null}, hard:null } },\n    { id:'s2', title:'Static Bloom',  band:'Vega Sound',     era:'90s', diffs:{ easy:{grade:'S'}, medium:{grade:'A'}, hard:{grade:null} } },\n    { id:'s3', title:'Dust & Chrome', band:'Highway Kids',   era:'70s', diffs:{ easy:{grade:null}, medium:null, hard:null } },\n    { id:'s4', title:'Overdrive',     band:'Kilowatt',       era:'80s', diffs:{ easy:{grade:'D'}, medium:null, hard:null } },\n    { id:'s5', title:'Radio Ghost',   band:'The Blender',    era:'00s', diffs:{ easy:{grade:null}, medium:null, hard:null } },\n  ];\n  DIFF_ORDER = ['easy','medium','hard'];\n  DIFF_LABEL = { easy:'EASY', medium:'MEDIUM', hard:'HARD' };\n  DIFF_COLOR = { easy:'#2E9E4F', medium:'#E8A200', hard:'#FF6B4A' };\n  UNLOCK_RULE = { easy:{ next:'medium', need:'C' }, medium:{ next:'hard', need:'B' } };\n  RANK_ORDER = { D:0, C:1, B:2, A:3, S:4 };\n\n  PLACEHOLDER = {\n    navigator:  { icon:'🧭', title:'NAVIGATOR',  desc:'Merge-map mini-game. Same entry/exit shell as Driver — built next.' },\n    dealership: { icon:'🚙', title:'DEALERSHIP', desc:'Spend Miles on new cars here. Each unlock changes your ride on the map.' },\n    mixtape:    { icon:'💿', title:'MIXTAPE',     desc:'Your collected songs, grouped by era. The format matches the station you\\u2019re tuned to.' },\n  };\n\n  go(screen, wipeLabel, wipeColor) {\n    this.setState({ wipe: { label: wipeLabel, color: wipeColor || '#BDEBFA', phase: 'in' } });\n    setTimeout(() => {\n      this.setState({ screen, wipe: { label: wipeLabel, color: wipeColor || '#BDEBFA', phase: 'out' } });\n      setTimeout(() => this.setState({ wipe: null }), 240);\n    }, 240);\n  }\n\n  enterMode = (e) => {\n    const mode = e.currentTarget.dataset.mode;\n    if (mode === 'driver') this.go('driverSelect', 'TUNING IN…', '#FFD23F');\n    else if (mode === 'navigator') this.go('navigator', 'PLOTTING ROUTE…', '#3FB6C7');\n    else if (mode === 'dealership') this.go('dealership', 'ROLLING IN…', '#FFD23F');\n    else if (mode === 'mixtape') this.go('mixtape', 'FLIPPING THE TAPE…', '#7B61FF');\n  };\n\n  cycleStation = () => {\n    const i = this.ERAS.indexOf(this.state.era);\n    this.setState({ era: this.ERAS[(i + 1) % this.ERAS.length] });\n  };\n\n  toggleSong(id) { this.setState({ expanded: this.state.expanded === id ? null : id }); }\n\n  pickDiff(songId, diff, unlocked) {\n    if (!unlocked) return;\n    this.setState({ songId, diff, expanded: null });\n    this.go('play', 'STARTING ENGINE…', '#FF8C42');\n  }\n\n  endSongMock = () => this.go('result', 'PULLING OVER…', '#BDEBFA');\n  retry = () => this.go('play', 'RESTARTING…', '#FF8C42');\n  backToSelect = () => this.go('driverSelect', 'BACK TO GARAGE…', '#FFD23F');\n  quitToSelect = () => this.go('driverSelect', 'BACK TO GARAGE…', '#FFD23F');\n  goHome = () => this.go('hub', 'BACK ON THE ROAD…', '#6FD3F2');\n\n  songUnlockState(song) {\n    const out = {};\n    this.DIFF_ORDER.forEach((d, i) => {\n      const entry = song.diffs[d];\n      if (i === 0) { out[d] = { unlocked: true, grade: entry ? entry.grade : null }; return; }\n      const prevKey = this.DIFF_ORDER[i-1];\n      const rule = this.UNLOCK_RULE[prevKey];\n      const prevEntry = song.diffs[prevKey];\n      const prevGrade = prevEntry ? prevEntry.grade : null;\n      const unlocked = !!(rule && prevGrade && this.RANK_ORDER[prevGrade] >= this.RANK_ORDER[rule.need]);\n      out[d] = { unlocked, grade: entry ? entry.grade : null, reqText: rule ? ('Get ' + rule.need + ' on ' + this.DIFF_LABEL[prevKey] + ' to unlock') : '' };\n    });\n    return out;\n  }\n\n  mixtapeIcon(era) {\n    const R = React.createElement;\n    if (era === '70s') { // 8-track: chunky rectangle\n      return R('div', { style:{ width:34, height:26, borderRadius:4, background:'#4A3B2A', border:'2px solid #2E2418', display:'flex', alignItems:'center', justifyContent:'center' } },\n        R('div', { style:{ width:20, height:12, background:'#C9A15A', borderRadius:2 } }));\n    }\n    if (era === '80s') { // cassette: rect with two reels\n      return R('div', { style:{ width:36, height:24, borderRadius:4, background:'#222', border:'2px solid #000', display:'flex', alignItems:'center', justifyContent:'center', gap:5 } },\n        R('div', { style:{ width:9, height:9, borderRadius:'50%', background:'#EEE', border:'2px solid #888' } }),\n        R('div', { style:{ width:9, height:9, borderRadius:'50%', background:'#EEE', border:'2px solid #888' } }));\n    }\n    if (era === '00s') { // mp3 player: rounded rect w/ screen + wheel\n      return R('div', { style:{ width:24, height:34, borderRadius:6, background:'#F2F2F2', border:'2px solid #C4C4C4', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', paddingTop:3, gap:3 } },\n        R('div', { style:{ width:16, height:11, background:'#4ec3c7', borderRadius:2 } }),\n        R('div', { style:{ width:12, height:12, borderRadius:'50%', background:'#fff', border:'2px solid #C4C4C4' } }));\n    }\n    // 90s: CD\n    return R('div', { style:{ width:34, height:34, borderRadius:'50%', background:'conic-gradient(from 0deg,#c9f,#9cf,#cf9,#fc9,#f9c,#c9f)', display:'flex', alignItems:'center', justifyContent:'center', boxShadow:'inset 0 0 0 2px rgba(255,255,255,.4)' } },\n      R('div', { style:{ width:10, height:10, borderRadius:'50%', background:'#FFF8EC', border:'2px solid #ccc' } }));\n  }\n\n  renderVals() {\n    const R = React.createElement;\n    const s = this.state.screen;\n    const isHub = s === 'hub';\n    const isDriverSelect = s === 'driverSelect';\n    const isPlaceholder = s === 'navigator' || s === 'dealership' || s === 'mixtape';\n    const isPlay = s === 'play';\n    const isResult = s === 'result';\n\n    const topBarHome = R('button', {\n      onClick: this.goHome,\n      style: { position:'absolute', top:14, left:14, zIndex:3, background:'#FFF8EC', border:'none', color:'#1F3A5F', borderRadius:20, padding:'8px 16px', fontSize:12.5, fontWeight:'bold', letterSpacing:.5, cursor:'pointer', boxShadow:'0 3px 0 rgba(0,0,0,.14)' }\n    }, '← MAP');\n\n    const songRows = this.SONGS.map(song => {\n      const unlockState = this.songUnlockState(song);\n      const expanded = this.state.expanded === song.id;\n      const pills = this.DIFF_ORDER.map(d => {\n        const u = unlockState[d];\n        const style = {\n          flex:1, textAlign:'center', padding:'11px 4px', borderRadius:12, cursor: u.unlocked ? 'pointer':'not-allowed',\n          border:'none', background: u.unlocked ? this.DIFF_COLOR[d] : '#E4E9EE',\n          opacity: u.unlocked ? 1 : .75, boxShadow: u.unlocked ? '0 3px 0 rgba(0,0,0,.15)' : 'none',\n        };\n        return R('div', { key:d, style, onClick: () => this.pickDiff(song.id, d, u.unlocked) },\n          R('div', { style:{ fontSize:12, fontWeight:'bold', letterSpacing:.5, color: u.unlocked ? '#fff' : '#8b93ad' } }, this.DIFF_LABEL[d] + (u.unlocked ? '' : ' 🔒')),\n          R('div', { style:{ fontSize:10, color: u.unlocked ? 'rgba(255,255,255,.85)' : '#8b93ad', marginTop:3 } }, u.grade ? ('best ' + u.grade) : (u.unlocked ? 'no grade yet' : u.reqText))\n        );\n      });\n      return { row: R('div', { key: song.id, style:{ background:'#FFF8EC', borderRadius:16, overflow:'hidden', boxShadow:'0 4px 0 rgba(0,0,0,.08)' } },\n        R('div', { onClick:()=>this.toggleSong(song.id), style:{ display:'flex', alignItems:'center', gap:12, padding:'11px 12px', cursor:'pointer' } },\n          R('div', { style:{ width:46, height:46, borderRadius:10, background:'linear-gradient(135deg,#FFD23F,#FF8C42)', flexShrink:0 } }),\n          R('div', { style:{ flex:1, minWidth:0 } },\n            R('div', { style:{ fontSize:14.5, fontWeight:'bold', color:'#1F3A5F', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, song.title),\n            R('div', { style:{ fontSize:11, color:'#5C7893', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' } }, song.band + ' · ' + song.era)\n          ),\n          R('div', { style:{ fontSize:14, color:'#5C7893', transform: expanded ? 'rotate(180deg)' : 'none', transition:'transform .15s' } }, '⌄')\n        ),\n        expanded ? R('div', { style:{ display:'flex', gap:8, padding:'0 12px 12px' } }, pills) : null\n      ) };\n    });\n\n    const selSong = this.SONGS.find(x => x.id === this.state.songId);\n    const selectedSongTitle = selSong ? selSong.title : '';\n    const selectedDiffLabel = this.state.diff ? this.DIFF_LABEL[this.state.diff] : '';\n    const showUnlock = this.state.diff === 'easy' || this.state.diff === 'medium';\n    const unlockLabel = this.state.diff === 'easy' ? 'MEDIUM' : 'HARD';\n\n    const st = this.STATION[this.state.era];\n    const stationLine = st.tag + ' · ' + st.name;\n\n    const ph = this.PLACEHOLDER[isPlaceholder ? s : 'navigator'];\n\n    const wipeShowing = !!this.state.wipe;\n    const wipeTransform = !this.state.wipe ? 'translateY(100%)' : (this.state.wipe.phase === 'in' ? 'translateY(0%)' : 'translateY(-100%)');\n\n    const NOTES = {\n      hub: ['The map is a tall vertical scroll — the road threads through terrain that shifts (harbor → farm → desert → coast) so scrolling feels like real distance.', 'Only New York is live; future cities sit greyed on the road so progress is legible, and they brighten in place as you unlock them — no separate menu.', 'Games live on a fixed right-hand dock as character bubbles (Dad = Driver, Mom = Navigator) so the map is browseable without losing the launch buttons. Dealership + Mixtape stack below.', 'The Mixtape icon mirrors the tuned era — CD for 90s, cassette 80s, 8-track 70s, MP3 player 00s. Tap the radio to cycle and watch it change.'],\n      driverSelect: ['In-place expand: tap a song, its difficulty pills drop down — fastest one-handed path from song to play.', 'Solid chunky pills read as game buttons; locked tiers show the exact grade needed inline.'],\n      navigator: ['Same shell as every mode: MAP pill top-left, wipe transition in. This is the frame the real merge game drops into.'],\n      dealership: ['Reached from the map dock, not the road — it\\u2019s a meta screen, so it uses the placeholder shell, not a city stop.'],\n      mixtape: ['Opens from the dock; the format shown matches the current station era, tying the radio and song collection together.'],\n      play: ['Quit ✕ returns to song select, not the map — cheap recovery from a mis-tap mid-song.', 'Score/combo HUD stays legible over any lane colors.'],\n      result: ['MAP pill reappears — result is a safe, fully-exitable screen.', 'RETRY replays same song+difficulty; SONG LIST returns to the picker so a new unlock shows immediately.'],\n    };\n    const noteHeading = ({ hub:'Hub — Map', driverSelect:'Driver — Song Select', navigator:'Navigator', dealership:'Dealership', mixtape:'Mixtape', play:'Play (mock)', result:'Result' })[s] || '';\n    const noteBody = R('ul', { style:{ margin:0, paddingLeft:18 } }, (NOTES[s]||[]).map((t,i)=>R('li',{key:i, style:{marginBottom:6}}, t)));\n\n    return {\n      isHub, isDriverSelect, isPlaceholder, isPlay, isResult,\n      enterMode: this.enterMode,\n      cycleStation: this.cycleStation,\n      stationLine,\n      mixtapeIcon: this.mixtapeIcon(this.state.era),\n      topBarHome,\n      songs: songRows,\n      selectedSongTitle, selectedDiffLabel,\n      endSongMock: this.endSongMock, quitToSelect: this.quitToSelect,\n      resultRank: 'A', rankColor: '#E8A200', showUnlock, unlockLabel,\n      retry: this.retry, backToSelect: this.backToSelect,\n      placeholderIcon: ph.icon, placeholderTitle: ph.title, placeholderDesc: ph.desc,\n      showWipe: wipeShowing,\n      wipeLabel: this.state.wipe ? this.state.wipe.label : '',\n      wipeColor: this.state.wipe ? this.state.wipe.color : '#BDEBFA',\n      wipeTransform,\n      noteHeading, noteBody,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
