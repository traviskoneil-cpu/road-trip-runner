<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12172b">
<title>Tap Trip — Road Trip Runner Rhythm</title>
<style>
  :root { --bg:#12172b; --panel:#1a2138; --accent:#e94560; --l0:#e94560; --l1:#ffd166; --l2:#4ec3c7; --text:#f0f0f0; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:"Trebuchet MS","Segoe UI",sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; }
  .hidden { display:none !important; }

  /* ---- song select ---- */
  #select { overflow-y:auto; padding:18px; }
  #select h1 { font-size:28px; letter-spacing:2px; text-transform:uppercase; text-align:center; margin:8px 0 2px; }
  #select h1 span { color:var(--accent); }
  #select .sub { text-align:center; font-size:13px; opacity:0.65; margin-bottom:6px; }
  .diffbar { display:flex; gap:8px; justify-content:center; align-items:center; margin:12px 0 18px; flex-wrap:wrap; }
  .diffbar label { font-size:12px; opacity:0.6; }
  .diff { background:transparent; color:var(--text); border:1px solid #445; padding:6px 16px; border-radius:18px; cursor:pointer; font-size:13px; }
  .diff.active { background:var(--accent); border-color:var(--accent); font-weight:bold; }
  .sync { background:transparent; color:var(--text); border:1px solid #445; width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:16px; }
  .sync:hover { border-color:var(--accent); }
  #syncVal { font-size:14px; min-width:52px; text-align:center; font-variant-numeric:tabular-nums; }
  .synchint { font-size:11px; opacity:0.45; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; max-width:900px; margin:0 auto; width:100%; }
  .song { background:var(--panel); border-radius:12px; overflow:hidden; cursor:pointer; transition:transform .1s; position:relative; }
  .song:hover { transform:translateY(-3px); }
  .song .art { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#2a3350; }
  .song .meta { padding:8px 10px 10px; }
  .song .t { font-weight:bold; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song .b { font-size:11px; color:var(--accent); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song .star { position:absolute; top:8px; right:8px; font-size:14px; filter:drop-shadow(0 1px 2px #000); }

  /* ---- loading ---- */
  #loading { align-items:center; justify-content:center; text-align:center; gap:14px; }
  #loading .spin { width:52px; height:52px; border:5px solid #2a3350; border-top-color:var(--accent); border-radius:50%; animation:sp 0.9s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  #loading .lt { font-size:15px; opacity:0.85; }

  /* ---- play ---- */
  #play { }
  #gameCanvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #hud { position:absolute; top:12px; left:0; right:0; display:flex; justify-content:space-between; padding:0 18px; pointer-events:none; z-index:2; }
  #hud .score { font-size:26px; font-weight:bold; }
  #hud .right { text-align:right; }
  #hud .combo { font-size:20px; color:var(--l1); font-weight:bold; }
  #hud .acc { font-size:13px; opacity:0.7; }
  #quit { position:absolute; top:12px; right:14px; background:rgba(0,0,0,0.4); border:1px solid #445; color:var(--text); border-radius:50%; width:34px; height:34px; font-size:15px; cursor:pointer; z-index:3; }

  /* ---- result ---- */
  #result { align-items:center; justify-content:center; text-align:center; gap:6px; padding:20px; }
  #result .rank { font-size:96px; font-weight:bold; line-height:1; margin-bottom:4px; }
  #result h2 { font-size:22px; letter-spacing:1px; }
  #result .rb { font-size:12px; color:var(--accent); margin-bottom:12px; }
  #result .stat { font-size:15px; opacity:0.9; line-height:1.9; }
  #result .fc { color:var(--l1); font-weight:bold; letter-spacing:2px; margin:6px 0; }
  .btn { background:var(--accent); color:#fff; border:none; font-size:16px; font-weight:bold; padding:11px 30px; border-radius:26px; cursor:pointer; margin:6px; letter-spacing:1px; }
  .btn.ghost { background:transparent; border:2px solid #556; }
  .keys { font-size:12px; opacity:0.5; margin-top:10px; text-align:center; }
  kbd { background:#333; border-radius:4px; padding:1px 6px; font-family:monospace; font-size:11px; border:1px solid #555; }
</style>
</head>
<body>

<!-- SONG SELECT -->
<div id="select" class="screen">
  <h1>TAP <span>TRIP</span></h1>
  <div class="sub">Three lanes. Your songs. Tap the notes on the beat.</div>
  <div class="diffbar">
    <label>DIFFICULTY</label>
    <button class="diff" data-d="easy">EASY</button>
    <button class="diff active" data-d="medium">MEDIUM</button>
    <button class="diff" data-d="hard">HARD</button>
  </div>
  <div class="diffbar">
    <label>AUDIO SYNC</label>
    <button class="sync" data-s="-10">&minus;</button>
    <span id="syncVal">0 ms</span>
    <button class="sync" data-s="10">+</button>
    <span class="synchint">notes hitting early? go +  ·  late? go &minus;</span>
  </div>
  <div class="grid" id="songGrid"></div>
  <div class="keys">
    Desktop: <kbd>F</kbd> <kbd>J</kbd> <kbd>K</kbd> or <kbd>&larr;</kbd> <kbd>&darr;</kbd> <kbd>&rarr;</kbd> &nbsp;·&nbsp; Mobile: tap the three lanes
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen hidden">
  <div class="spin"></div>
  <div class="lt" id="loadText">Building the chart…</div>
</div>

<!-- PLAY -->
<div id="play" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div><div class="score" id="hScore">0</div><div class="acc" id="hAcc">100%</div><div class="combo" id="hCombo"></div></div>
  </div>
  <button id="quit">✕</button>
</div>

<!-- RESULT -->
<div id="result" class="screen hidden">
  <div class="rank" id="rRank">A</div>
  <h2 id="rSong"></h2>
  <div class="rb" id="rBand"></div>
  <div class="fc hidden" id="rFC">★ FULL COMBO ★</div>
  <div class="stat" id="rStats"></div>
  <div>
    <button class="btn" id="rRetry">RETRY</button>
    <button class="btn ghost" id="rBack">SONG LIST</button>
  </div>
</div>

<script>
"use strict";
// ============================================================
// TAP TRIP — a 3-lane Tap-Tap-Revenge-style rhythm game that
// reuses Road Trip Runner's songs. Charts are generated from the
// audio in-browser (multiband onset detection), so every song
// is instantly playable. Standalone at /tap/.
// ============================================================

// roundRect fallback for browsers that lack it (keeps the render loop alive)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath();
  };
}
const $ = (id) => document.getElementById(id);
const screens = { select: $("select"), loading: $("loading"), play: $("play"), result: $("result") };
function show(name) { for (const k in screens) screens[k].classList.toggle("hidden", k !== name); }

let DIFFICULTY = "medium";
let SYNC_MS = +(localStorage.getItem("tap_sync") || 0); // manual calibration, ms
const DIFF = { // min spacing between notes (s) and hit windows
  easy:   { spacing: 0.32, k: 1.5 },
  medium: { spacing: 0.20, k: 1.4 },
  hard:   { spacing: 0.135, k: 1.3 },
};
const LANES = 3;
const LANE_COLOR = ["#e94560", "#ffd166", "#4ec3c7"];
const LEAD = 1.5;            // seconds a note is visible before its hit time
const W_PERFECT = 0.045, W_GOOD = 0.095, W_MISS = 0.13; // timing windows (s)

let audioCtx = null, songBuffer = null, source = null;
let songMeta = null, chart = [], startAt = 0, running = false, rafId = 0;
let stats = null;

// ---------- metadata / song select ----------
const COLLECTED = new Set(JSON.parse(localStorage.getItem("rtr_collected") || "[]"));
let META = [];

fetch("../radio/stations.json").then((r) => r.json()).then((d) => {
  for (const era of ["90s", "00s", "70s", "80s"]) {
    const tracks = (d.stations[era] && d.stations[era].tracks) || [];
    for (const t of tracks) META.push({ era, ...t });
  }
  renderGrid();
}).catch((e) => { $("loadText").textContent = "Could not load song list."; });

function coverURL(m) { return "../radio/covers/" + m.era + "/" + encodeURIComponent(m.file.replace(/\.[^.]+$/, "")) + ".jpg"; }
function songURL(m) { return "../radio/music/" + m.era + "/" + encodeURIComponent(m.file); }

function renderGrid() {
  const g = $("songGrid");
  g.innerHTML = "";
  for (const m of META) {
    const collected = COLLECTED.has(m.era + "|" + m.file);
    const el = document.createElement("div");
    el.className = "song";
    el.innerHTML =
      '<img class="art" alt="" src="' + coverURL(m) + '" onerror="this.style.visibility=\'hidden\'">' +
      (collected ? '<span class="star">★</span>' : '') +
      '<div class="meta"><div class="t"></div><div class="b"></div></div>';
    el.querySelector(".t").textContent = m.song;
    el.querySelector(".b").textContent = m.band;
    el.addEventListener("click", () => startSong(m));
    g.appendChild(el);
  }
}

document.querySelectorAll(".diff").forEach((b) => b.addEventListener("click", () => {
  document.querySelectorAll(".diff").forEach((x) => x.classList.remove("active"));
  b.classList.add("active");
  DIFFICULTY = b.dataset.d;
}));
function updateSync() { $("syncVal").textContent = (SYNC_MS > 0 ? "+" : "") + SYNC_MS + " ms"; }
document.querySelectorAll(".sync").forEach((b) => b.addEventListener("click", () => {
  SYNC_MS = Math.max(-300, Math.min(300, SYNC_MS + (+b.dataset.s)));
  localStorage.setItem("tap_sync", SYNC_MS);
  updateSync();
}));
updateSync();

// ============================================================
// CHART GENERATION — multiband onset detection
// ============================================================
function lowpass(sig, sr, fc) {
  const dt = 1 / sr, RC = 1 / (2 * Math.PI * fc), a = dt / (RC + dt);
  const y = new Float32Array(sig.length); let p = 0;
  for (let i = 0; i < sig.length; i++) { p += a * (sig[i] - p); y[i] = p; }
  return y;
}
function highpass(sig, sr, fc) {
  const dt = 1 / sr, RC = 1 / (2 * Math.PI * fc), a = RC / (RC + dt);
  const y = new Float32Array(sig.length); let py = 0, px = 0;
  for (let i = 0; i < sig.length; i++) { const x = sig[i]; py = a * (py + x - px); y[i] = py; px = x; }
  return y;
}
function bandOnsets(sig, sr, lane, minGap, kThresh, benv, gate) {
  const hopS = 0.011, hop = Math.max(1, Math.round(sr * hopS));
  const nF = Math.floor(sig.length / hop);
  const env = new Float32Array(nF);
  for (let f = 0; f < nF; f++) {
    let s = 0; const start = f * hop;
    for (let i = 0; i < hop; i++) { const v = sig[start + i] || 0; s += v * v; }
    env[f] = Math.sqrt(s / hop);
  }
  const odf = new Float32Array(nF);
  for (let f = 1; f < nF; f++) { const d = env[f] - env[f - 1]; odf[f] = d > 0 ? d : 0; }
  const onsets = [];
  const Wf = Math.round(0.2 / hopS), gapF = Math.round(minGap / hopS);
  let last = -1e9;
  for (let f = 1; f < nF - 1; f++) {
    if (benv[f] < gate) continue; // loudness gate: no notes in silence / fades / quiet
    let mean = 0, cnt = 0;
    for (let j = Math.max(0, f - Wf); j <= Math.min(nF - 1, f + Wf); j++) { mean += odf[j]; cnt++; }
    mean /= cnt;
    const thr = mean * kThresh + gate * 0.2; // floor tied to loudness, not a tiny constant
    if (odf[f] > thr && odf[f] >= odf[f - 1] && odf[f] >= odf[f + 1] && (f - last) >= gapF) {
      onsets.push({ t: (f * hop) / sr, lane, s: odf[f] });
      last = f;
    }
  }
  return onsets;
}
function generateChart(buf) {
  const sr = buf.sampleRate, n = buf.length;
  const a0 = buf.getChannelData(0), a1 = buf.numberOfChannels > 1 ? buf.getChannelData(1) : a0;
  const mono = new Float32Array(n);
  let peak = 1e-6;
  for (let i = 0; i < n; i++) { const v = 0.5 * (a0[i] + a1[i]); mono[i] = v; if (Math.abs(v) > peak) peak = Math.abs(v); }
  const g = 1 / peak;
  for (let i = 0; i < n; i++) mono[i] *= g; // normalize

  // broadband energy envelope + a loudness-relative gate, so we never chart
  // silence, fades, or trailing dead air (the source of phantom end-of-song notes)
  const hopS = 0.011, hop = Math.max(1, Math.round(sr * hopS));
  const nF = Math.floor(n / hop);
  const benv = new Float32Array(nF);
  for (let f = 0; f < nF; f++) { let s = 0; const st = f * hop; for (let i = 0; i < hop; i++) { const v = mono[st + i] || 0; s += v * v; } benv[f] = Math.sqrt(s / hop); }
  const loud = Array.from(benv).filter((v) => v > 0).sort((x, y) => x - y);
  const loudRef = loud.length ? loud[Math.floor(loud.length * 0.75)] : 0; // robust "loud" level
  const gate = loudRef * 0.16;
  let lastLoud = 0; for (let f = 0; f < nF; f++) if (benv[f] > gate) lastLoud = f;
  const endT = (lastLoud * hop) / sr; // where the music actually stops

  const low = lowpass(mono, sr, 150);
  const high = highpass(mono, sr, 4500);
  const mid = highpass(lowpass(mono, sr, 3000), sr, 300);

  const D = DIFF[DIFFICULTY];
  let notes = [];
  notes = notes.concat(bandOnsets(low, sr, 0, 0.16, D.k + 0.1, benv, gate));
  notes = notes.concat(bandOnsets(mid, sr, 1, 0.13, D.k + 0.2, benv, gate));
  notes = notes.concat(bandOnsets(high, sr, 2, 0.10, D.k + 0.35, benv, gate));
  notes.sort((x, y) => x.t - y.t);

  // thin to a single-note stream at the difficulty spacing, keeping stronger hits
  const kept = [];
  for (const nt of notes) {
    const prev = kept[kept.length - 1];
    if (!prev || nt.t - prev.t >= D.spacing) kept.push(nt);
    else if (nt.s > prev.s * 1.3) kept[kept.length - 1] = nt; // replace with the stronger onset
  }
  // drop the lead-in click and anything past where the music actually ends
  const inRange = kept.filter((nt) => nt.t > 0.4 && nt.t <= endT);
  // turn a note into a HOLD when it's followed by a gap of sustained energy
  const out = [];
  for (let i = 0; i < inRange.length; i++) {
    const nt = inRange[i];
    const nextT = i + 1 < inRange.length ? inRange[i + 1].t : endT;
    const gap = nextT - nt.t;
    let hold = 0;
    if (gap >= 0.55) {
      const f0 = Math.floor(nt.t / hopS), f1 = Math.floor((nt.t + Math.min(gap, 2.4)) / hopS);
      let above = 0, tot = 0;
      for (let f = f0; f < f1 && f < benv.length; f++) { tot++; if (benv[f] > gate) above++; }
      if (tot > 0 && above / tot > 0.72) hold = Math.min(gap - 0.18, 2.0);
      if (hold < 0.35) hold = 0;
    }
    out.push({ t: nt.t, lane: nt.lane, hold, hit: false, judged: false, headHit: false, holding: false, done: false });
  }
  return out;
}

// ============================================================
// GAME
// ============================================================
async function startSong(m) {
  songMeta = m;
  show("loading");
  $("loadText").textContent = "Loading “" + m.song + "”…";
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume().catch(() => {}); // unlock inside the click gesture
    const arr = await fetch(songURL(m)).then((r) => r.arrayBuffer());
    $("loadText").textContent = "Building the chart…";
    songBuffer = await audioCtx.decodeAudioData(arr);
    chart = generateChart(songBuffer);
    if (!chart.length) { $("loadText").textContent = "No beats found — try another track."; return; }
    if (audioCtx.state !== "running") await audioCtx.resume().catch(() => {}); // ensure running after the awaits
    beginPlay();
  } catch (e) {
    $("loadText").textContent = "Couldn't load that one. (" + (e && e.name || "error") + ")";
    console.error(e);
  }
}

const canvas = $("gameCanvas"), ctx = canvas.getContext("2d");
let CW = 0, CH = 0, laneW = 0, fieldX = 0, fieldW = 0, targetY = 0;
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  CW = canvas.clientWidth; CH = canvas.clientHeight;
  canvas.width = CW * dpr; canvas.height = CH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fieldW = Math.min(CW, 460); fieldX = (CW - fieldW) / 2;
  laneW = fieldW / LANES;
  targetY = CH * 0.82;
}
window.addEventListener("resize", resize);

// ---- Dad Mode: hazy highway out the windshield. Just the occasional single
// vehicle — one you slowly overtake, or one that slowly passes you. ----
const Traffic = {
  cars: [], ready: false, dash: 0, next: 0,
  init() { this.cars = []; this.ready = true; this.dash = 0; this.next = 3 + Math.random() * 4; },
  spawn() {
    const side = Math.random() < 0.5 ? -1 : 1;
    const semi = Math.random() < 0.5;
    if (Math.random() < 0.5) {
      // you slowly OVERTAKE it: starts far & small, grows and drifts past the bottom
      this.cars.push({ z: 0.12, vz: 0.028 + Math.random() * 0.018, lane: side * (0.3 + Math.random() * 0.4), semi, hue: 205 + Math.random() * 40 });
    } else {
      // it slowly PASSES you: starts near & big, pulls ahead and shrinks to the horizon
      this.cars.push({ z: 0.92, vz: -(0.02 + Math.random() * 0.016), lane: side * (0.55 + Math.random() * 0.35), semi, hue: 205 + Math.random() * 40 });
    }
  },
  update(dt) {
    if (!this.ready) this.init();
    this.dash = (this.dash + dt * 0.4) % 1;
    for (const c of this.cars) c.z += c.vz * dt;
    this.cars = this.cars.filter((c) => c.z > 0.04 && c.z < 1.28);
    this.next -= dt;
    if (this.next <= 0) { if (this.cars.length < 2) this.spawn(); this.next = 9 + Math.random() * 13; }
  },
  draw() {
    const hY = CH * 0.40, vx = CW / 2;
    const sky = ctx.createLinearGradient(0, 0, 0, hY);
    sky.addColorStop(0, "rgba(48,58,88,0.30)"); sky.addColorStop(1, "rgba(120,95,95,0.26)");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, CW, hY);
    ctx.fillStyle = "rgba(26,28,38,0.40)";
    ctx.beginPath();
    ctx.moveTo(vx - CW * 0.05, hY); ctx.lineTo(vx + CW * 0.05, hY);
    ctx.lineTo(CW * 1.15, CH); ctx.lineTo(-CW * 0.15, CH); ctx.closePath(); ctx.fill();
    // center dashes scrolling toward you (sense of motion)
    ctx.strokeStyle = "rgba(255,240,180,0.09)"; ctx.lineCap = "round";
    for (let k = 0; k < 7; k++) {
      const z = (k / 7 + this.dash) % 1, y = hY + z * (CH - hY);
      ctx.lineWidth = 2 + z * 9; ctx.beginPath(); ctx.moveTo(vx, y); ctx.lineTo(vx, y + 6 + z * 22); ctx.stroke();
    }
    for (const c of this.cars.slice().sort((a, b) => a.z - b.z)) this.drawVehicle(c, hY, vx);
    ctx.fillStyle = "rgba(130,130,150,0.04)"; ctx.fillRect(0, 0, CW, CH);
    // dashboard / windshield frame silhouette
    ctx.fillStyle = "rgba(8,10,18,0.6)";
    ctx.beginPath(); ctx.moveTo(0, CH); ctx.lineTo(0, CH - 26);
    ctx.quadraticCurveTo(CW * 0.5, CH - 66, CW, CH - 26); ctx.lineTo(CW, CH); ctx.closePath(); ctx.fill();
  },
  drawVehicle(c, hY, vx) {
    const p = c.z; if (p < 0 || p > 1.18) return;
    const scale = 0.07 + p * p * 1.15;
    const y = hY + p * (CH - hY);
    const x = vx + c.lane * (CW * 0.09 + p * CW * 0.34);
    const w = (c.semi ? 66 : 48) * scale * 1.7, h = (c.semi ? 92 : 36) * scale * 1.7;
    const a = 0.16 + p * 0.30;
    ctx.fillStyle = "hsla(" + c.hue + ",20%," + (30 + p * 18) + "%," + a + ")"; // body
    ctx.beginPath(); ctx.roundRect(x - w / 2, y - h, w, h, 4 * scale + 2); ctx.fill();
    ctx.fillStyle = "hsla(" + c.hue + ",22%," + (46 + p * 16) + "%," + (a * 0.85) + ")"; // cab / roof
    if (c.semi) { ctx.beginPath(); ctx.roundRect(x - w / 2, y - h * 0.26, w, h * 0.26, 3 * scale + 1); ctx.fill(); }
    else { ctx.beginPath(); ctx.roundRect(x - w * 0.34, y - h * 0.92, w * 0.68, h * 0.5, 3 * scale + 1); ctx.fill(); }
    ctx.fillStyle = "rgba(240,80,66," + Math.min(0.9, a * 1.5) + ")"; // tail lights
    ctx.fillRect(x - w / 2 + 2 * scale, y - h * 0.30, w * 0.16, h * 0.15);
    ctx.fillRect(x + w / 2 - w * 0.16 - 2 * scale, y - h * 0.30, w * 0.16, h * 0.15);
  },
};

let hitFx = [];     // {lane, t} lane flashes
let judgeFx = null; // {text, color, t}
function beginPlay() {
  show("play");
  resize();
  stats = { score: 0, combo: 0, maxCombo: 0, perfect: 0, good: 0, miss: 0, mult: 1, total: chart.length };
  for (const nt of chart) { nt.hit = false; nt.judged = false; nt.headHit = false; nt.holding = false; nt.done = false; }
  hitFx = []; judgeFx = null; laneDown = [false, false, false]; lastLoopMs = 0;
  Traffic.init();
  // count-in: start audio a bit ahead so the first notes fall in
  source = audioCtx.createBufferSource();
  source.buffer = songBuffer;
  const gain = audioCtx.createGain(); gain.gain.value = 0.92;
  source.connect(gain).connect(audioCtx.destination);
  startAt = audioCtx.currentTime + 1.6;
  source.start(startAt);
  source.onended = () => { if (running) endSong(); };
  running = true;
  loop();
}
// song clock, compensated for how late the sound actually leaves the speakers
// (outputLatency) plus the player's manual calibration
function songTime() { return (audioCtx.currentTime - startAt) - (audioCtx.outputLatency || 0) - SYNC_MS / 1000; }

let lastLoopMs = 0;
function loop() {
  if (!running) return;
  const now = performance.now();
  const dt = lastLoopMs ? Math.min(0.05, (now - lastLoopMs) / 1000) : 0.016;
  lastLoopMs = now;
  const t = songTime();
  // auto-miss heads that passed the window
  for (const nt of chart) {
    if (!nt.judged && t - nt.t > W_MISS) { nt.judged = true; registerMiss(); if (nt.hold > 0) nt.done = true; }
  }
  // sustain scoring: award while held, complete at the end, break on early release
  for (const nt of chart) {
    if (nt.hold <= 0 || !nt.headHit || nt.done) continue;
    if (t >= nt.t + nt.hold) { completeHold(nt); continue; }
    if (laneDown[nt.lane]) stats.score += 180 * stats.mult * dt;
    else breakHold(nt);
  }
  Traffic.update(dt);
  draw(t);
  const last = chart[chart.length - 1];
  const lastEnd = last.t + (last.hold || 0);
  if (t > lastEnd + 1.3) { endSong(); return; }
  rafId = requestAnimationFrame(loop);
}

function draw(t) {
  ctx.clearRect(0, 0, CW, CH);
  Traffic.draw(); // Dad Mode: hazy highway behind the lanes
  // field bg — slightly darkened so notes read over the traffic
  ctx.fillStyle = "rgba(10,14,28,0.42)";
  ctx.fillRect(fieldX, 0, fieldW, CH);
  // lane separators + target ring
  for (let L = 0; L < LANES; L++) {
    const cx = fieldX + laneW * (L + 0.5);
    // lane flash
    const fx = hitFx.find((h) => h.lane === L);
    if (fx) {
      const a = Math.max(0, 1 - (performance.now() - fx.t) / 180);
      ctx.fillStyle = LANE_COLOR[L] + Math.floor(a * 40 + 8).toString(16).padStart(2, "0");
      ctx.fillRect(fieldX + laneW * L, 0, laneW, CH);
    }
    // target ring
    ctx.beginPath();
    ctx.arc(cx, targetY, laneW * 0.34, 0, Math.PI * 2);
    ctx.lineWidth = 3; ctx.strokeStyle = LANE_COLOR[L] + "aa"; ctx.stroke();
  }
  ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1;
  for (let L = 1; L < LANES; L++) { ctx.beginPath(); ctx.moveTo(fieldX + laneW * L, 0); ctx.lineTo(fieldX + laneW * L, CH); ctx.stroke(); }
  // target line
  ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(fieldX, targetY); ctx.lineTo(fieldX + fieldW, targetY); ctx.stroke();

  // notes (taps + holds)
  for (const nt of chart) {
    const isHold = nt.hold > 0;
    if (!isHold) {
      if (nt.judged && nt.hit) continue;
      if (nt.judged && !nt.hit && t - nt.t > 0.2) continue;
    } else if (nt.done && t - (nt.t + nt.hold) > 0.15) continue;
    const cx = fieldX + laneW * (nt.lane + 0.5), r = laneW * 0.30;
    const headFrac = (nt.t - t) / LEAD;
    const headY = targetY - headFrac * (targetY + 40);
    // hold tail
    if (isHold) {
      const endFrac = (nt.t + nt.hold - t) / LEAD;
      const yTop = targetY - endFrac * (targetY + 40);
      let yBot = headY;
      if (nt.headHit && !nt.done) yBot = Math.max(yTop, targetY); // consumed part clamps to the line
      if (yTop < CH && yBot > -40) {
        const bw = laneW * 0.36;
        ctx.fillStyle = LANE_COLOR[nt.lane];
        ctx.globalAlpha = nt.holding ? 0.9 : (nt.done ? 0.2 : 0.5);
        ctx.beginPath();
        ctx.roundRect(cx - bw / 2, Math.min(yTop, yBot), bw, Math.max(2, Math.abs(yBot - yTop)), bw / 2);
        ctx.fill(); ctx.globalAlpha = 1;
      }
      if (nt.holding) { // pulsing glow at the line while sustaining
        ctx.beginPath(); ctx.arc(cx, targetY, r * 1.15, 0, Math.PI * 2);
        ctx.fillStyle = LANE_COLOR[nt.lane];
        ctx.globalAlpha = 0.45 + 0.3 * Math.abs(Math.sin(performance.now() / 90));
        ctx.fill(); ctx.globalAlpha = 1;
      }
    }
    // head (hidden once a hold's head is grabbed)
    if (headFrac <= 1.05 && headY >= -40 && !(isHold && nt.headHit)) {
      ctx.beginPath(); ctx.arc(cx, headY, r, 0, Math.PI * 2);
      ctx.fillStyle = LANE_COLOR[nt.lane];
      ctx.globalAlpha = (nt.judged && !isHold) ? 0.3 : 1;
      ctx.fill(); ctx.globalAlpha = 1;
      ctx.lineWidth = 3; ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.stroke();
    }
  }

  // count-in
  if (t < 0) {
    const n = Math.ceil(-t);
    ctx.fillStyle = "#fff"; ctx.font = "bold 64px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(n, CW / 2, CH * 0.42);
    ctx.font = "16px sans-serif"; ctx.fillText("GET READY", CW / 2, CH * 0.5);
    ctx.textAlign = "left";
  }
  // judgment flash
  if (judgeFx) {
    const a = Math.max(0, 1 - (performance.now() - judgeFx.t) / 500);
    if (a > 0) {
      ctx.globalAlpha = a; ctx.fillStyle = judgeFx.color; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(judgeFx.text, CW / 2, targetY - 60); ctx.textAlign = "left"; ctx.globalAlpha = 1;
    }
  }
  // live HUD
  $("hScore").textContent = stats.score.toLocaleString();
  $("hCombo").textContent = stats.combo > 1 ? stats.combo + "x  ·  " + stats.mult + "×" : "";
  const done = stats.perfect + stats.good + stats.miss;
  $("hAcc").textContent = done ? Math.round(((stats.perfect + stats.good * 0.5) / done) * 100) + "%" : "100%";
}

// ---------- input ----------
let laneDown = [false, false, false];
function pressLane(L) {
  if (!running) return;
  laneDown[L] = true;
  const t = songTime();
  // nearest unjudged note in this lane within the good window
  let best = null, bestDt = 1e9;
  for (const nt of chart) {
    if (nt.judged || nt.lane !== L) continue;
    const dt = Math.abs(nt.t - t);
    if (dt < bestDt) { bestDt = dt; best = nt; }
  }
  hitFx = hitFx.filter((h) => h.lane !== L); hitFx.push({ lane: L, t: performance.now() });
  if (best && bestDt <= W_GOOD) {
    best.judged = true; best.hit = true;
    if (bestDt <= W_PERFECT) registerHit(true); else registerHit(false);
    if (best.hold > 0) { best.headHit = true; best.holding = true; } // begin the sustain
  }
  // taps with no note in window are ignored (no penalty) — keeps it forgiving
}
function releaseLane(L) {
  laneDown[L] = false;
  const t = songTime();
  for (const nt of chart) {
    if (nt.lane !== L || !nt.holding || nt.done) continue;
    if (t >= nt.t + nt.hold - W_GOOD) completeHold(nt); else breakHold(nt);
  }
}
function completeHold(nt) {
  nt.holding = false; nt.done = true;
  stats.score += 120 * stats.mult;
  judgeFx = { text: "HOLD!", color: "#4ec3c7", t: performance.now() };
}
function breakHold(nt) {
  nt.holding = false; nt.done = true;
  stats.combo = 0; stats.mult = 1;
  judgeFx = { text: "LET GO", color: "#e94560", t: performance.now() };
}
function registerHit(perfect) {
  stats.combo++; stats.maxCombo = Math.max(stats.maxCombo, stats.combo);
  stats.mult = Math.min(4, 1 + Math.floor(stats.combo / 10));
  const base = perfect ? 100 : 50;
  stats.score += base * stats.mult;
  if (perfect) stats.perfect++; else stats.good++;
  judgeFx = { text: perfect ? "PERFECT" : "GOOD", color: perfect ? "#4ec3c7" : "#ffd166", t: performance.now() };
}
function registerMiss() {
  stats.miss++; stats.combo = 0; stats.mult = 1;
  judgeFx = { text: "MISS", color: "#e94560", t: performance.now() };
}

const KEY_LANE = { "f": 0, "j": 1, "k": 2, "arrowleft": 0, "arrowdown": 1, "arrowright": 2 };
document.addEventListener("keydown", (e) => {
  if (e.repeat) return;
  const L = KEY_LANE[e.key.toLowerCase()];
  if (L !== undefined) { e.preventDefault(); pressLane(L); }
  if (e.key === "Escape" && running) quitToSelect();
});
document.addEventListener("keyup", (e) => {
  const L = KEY_LANE[e.key.toLowerCase()];
  if (L !== undefined) releaseLane(L);
});
function laneOf(x) {
  if (x < fieldX || x > fieldX + fieldW) return x < CW / 2 ? 0 : 2; // outside maps to nearest side
  return Math.min(LANES - 1, Math.floor((x - fieldX) / laneW));
}
const pointerLane = {}; // pointerId -> lane, so multi-touch holds work
canvas.addEventListener("pointerdown", (e) => { const L = laneOf(e.clientX); pointerLane[e.pointerId] = L; pressLane(L); });
canvas.addEventListener("pointerup", (e) => { const L = pointerLane[e.pointerId]; if (L !== undefined) releaseLane(L); delete pointerLane[e.pointerId]; });
canvas.addEventListener("pointercancel", (e) => { const L = pointerLane[e.pointerId]; if (L !== undefined) releaseLane(L); delete pointerLane[e.pointerId]; });

// ---------- end / result ----------
function stopSource() { if (source) { try { source.onended = null; source.stop(); } catch (e) {} source = null; } }
function quitToSelect() { running = false; cancelAnimationFrame(rafId); stopSource(); show("select"); }
function endSong() {
  if (!running) return;
  running = false; cancelAnimationFrame(rafId); stopSource();
  const done = stats.perfect + stats.good + stats.miss || 1;
  const acc = (stats.perfect + stats.good * 0.5) / done;
  const fc = stats.miss === 0 && (stats.perfect + stats.good) > 0;
  let rank = "D";
  if (acc >= 0.95) rank = "S"; else if (acc >= 0.88) rank = "A"; else if (acc >= 0.75) rank = "B"; else if (acc >= 0.6) rank = "C";
  $("rRank").textContent = rank;
  $("rRank").style.color = rank === "S" ? "#4ec3c7" : rank === "A" ? "#ffd166" : rank === "D" ? "#e94560" : "#fff";
  $("rSong").textContent = songMeta.song;
  $("rBand").textContent = songMeta.band;
  $("rFC").classList.toggle("hidden", !fc);
  $("rStats").innerHTML =
    "Score <b>" + stats.score.toLocaleString() + "</b><br>" +
    "Accuracy <b>" + Math.round(acc * 100) + "%</b><br>" +
    "Max combo <b>" + stats.maxCombo + "</b><br>" +
    "<span style='color:#4ec3c7'>Perfect " + stats.perfect + "</span> · " +
    "<span style='color:#ffd166'>Good " + stats.good + "</span> · " +
    "<span style='color:#e94560'>Miss " + stats.miss + "</span>";
  show("result");
}
$("quit").addEventListener("click", quitToSelect);
$("rBack").addEventListener("click", () => show("select"));
$("rRetry").addEventListener("click", () => startSong(songMeta));
</script>
</body>
</html>
