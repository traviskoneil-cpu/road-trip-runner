<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12172b">
<title>Driver — Road Trip Runner Rhythm</title>
<style>
  :root {
    --bg:#12172b; --panel:#1a2138; --accent:#e94560; --l0:#e94560; --l1:#ffd166; --l2:#4ec3c7; --text:#f0f0f0;
    --cream:#fff8ec; --ink:#1f3a5f; --muted:#5c7893; --orange:#ff6b4a; --teal:#3fb6c7; --gold:#ffd23f;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; }
  body {
    background:var(--bg); color:var(--text);
    font-family:"Trebuchet MS","Segoe UI",sans-serif;
    overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  .map-link {
    position:fixed;
    top:max(12px, env(safe-area-inset-top));
    left:max(12px, env(safe-area-inset-left));
    z-index:10;
    color:var(--text);
    text-decoration:none;
    background:rgba(8,10,20,0.66);
    border:1px solid rgba(255,255,255,0.18);
    border-radius:999px;
    padding:8px 13px;
    font-size:12px;
    font-weight:bold;
    letter-spacing:1px;
    backdrop-filter:blur(8px);
  }
  .map-link:hover { border-color:var(--accent); }
  .screen { position:fixed; inset:0; display:flex; flex-direction:column; }
  .hidden { display:none !important; }

  /* ---- song select ---- */
  #select {
    align-items:center;
    background:
      radial-gradient(520px 300px at 50% -8%, rgba(255,210,63,0.20), transparent 64%),
      linear-gradient(180deg, #111832 0%, #070a13 100%);
    overflow:hidden;
  }
  .driver-shell {
    position:relative;
    width:min(100%,430px);
    height:100vh;
    height:100dvh;
    overflow:hidden;
    background:
      radial-gradient(260px 150px at 50% -8%, rgba(255,248,236,0.76), transparent 72%),
      linear-gradient(180deg, #bdebf8 0%, #f8eed4 44%, #223553 44.5%, #0d1424 100%);
    color:var(--cream);
    display:flex;
    flex-direction:column;
    box-shadow:0 0 0 8px #05070d, 0 30px 80px rgba(0,0,0,0.5);
  }
  .driver-head {
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:58px minmax(0,1fr) 72px;
    gap:10px;
    align-items:center;
    padding:58px 16px 12px;
    color:var(--ink);
  }
  .driver-face {
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--gold);
    border:3px solid var(--cream);
    display:grid;
    place-items:center;
    overflow:hidden;
    box-shadow:0 5px 0 rgba(31,58,95,0.20);
  }
  .driver-face img { width:68px; max-width:none; transform:translateY(2px); }
  .driver-kicker {
    color:var(--orange);
    font-size:11px;
    font-weight:900;
    letter-spacing:1.4px;
  }
  #select h1 {
    font-size:30px;
    letter-spacing:0;
    line-height:0.95;
    text-transform:uppercase;
    margin:1px 0 4px;
    color:var(--ink);
  }
  #select .sub {
    font-size:12px;
    line-height:1.25;
    color:rgba(31,58,95,0.72);
    font-weight:700;
  }
  .driver-stats {
    justify-self:end;
    min-width:66px;
    border-radius:8px;
    background:var(--cream);
    color:var(--ink);
    text-align:center;
    padding:8px 7px 7px;
    box-shadow:0 4px 0 rgba(31,58,95,0.16);
  }
  .driver-stats strong { display:block; font-size:22px; line-height:1; }
  .driver-stats span { display:block; margin-top:3px; font-size:9px; font-weight:900; letter-spacing:1px; text-transform:uppercase; }
  .driver-scroll {
    position:relative;
    z-index:1;
    flex:1;
    min-height:0;
    overflow-y:auto;
    padding:2px 14px 20px;
    scrollbar-width:none;
  }
  .driver-scroll::-webkit-scrollbar { width:0; height:0; }
  #songGrid { width:100%; }
  .grid { display:grid; grid-template-columns:1fr; gap:9px; width:100%; }
  .decade {
    font-size:11px;
    letter-spacing:1.5px;
    color:var(--gold);
    text-transform:uppercase;
    opacity:0.95;
    margin:16px 2px 8px;
    font-weight:900;
    text-shadow:0 2px 8px rgba(0,0,0,0.35);
  }
  .song {
    min-height:92px;
    background:rgba(255,248,236,0.95);
    color:var(--ink);
    border-radius:8px;
    overflow:hidden;
    cursor:pointer;
    position:relative;
    display:grid;
    grid-template-columns:76px minmax(0,1fr);
    border:2px solid rgba(255,255,255,0.62);
    box-shadow:0 6px 0 rgba(0,0,0,0.18);
  }
  .song.open { border-color:var(--gold); box-shadow:0 6px 0 rgba(0,0,0,0.20), 0 0 0 2px rgba(255,210,63,0.35); }
  .song .art { width:76px; height:100%; min-height:92px; object-fit:cover; display:block; background:#2a3350; }
  .song .meta { min-width:0; padding:10px 10px 8px; display:flex; flex-direction:column; justify-content:center; }
  .song .t { font-weight:900; font-size:15px; line-height:1.05; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .song .b { font-size:11px; color:var(--orange); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:800; }
  .song .tag { justify-self:start; margin-top:6px; background:rgba(63,182,199,0.18); color:var(--ink); font-size:9px; letter-spacing:.6px; padding:3px 7px; border-radius:8px; font-weight:900; text-transform:uppercase; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .song .star { position:absolute; top:6px; right:8px; color:var(--gold); font-size:15px; filter:drop-shadow(0 1px 1px rgba(31,58,95,0.35)); }
  .song .diffs { grid-column:1 / -1; display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:7px; padding:0 9px 10px; }
  .diffpick { background:rgba(31,58,95,0.08); color:var(--ink); border:1px solid rgba(31,58,95,0.18); padding:9px 8px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:900; letter-spacing:.6px; min-width:0; }
  .diffpick .small { display:block; margin-top:3px; font-size:10px; font-weight:normal; letter-spacing:0; opacity:.7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .diffpick.unlocked { border-color:rgba(31,58,95,0.24); }
  .diffpick.locked { opacity:0.45; cursor:not-allowed; }
  .diffpick.easy { background:rgba(78,195,199,0.14); }
  .diffpick.medium { background:rgba(255,209,102,0.14); }
  .diffpick.hard { background:rgba(233,69,96,0.14); }
  .diffpick.shake { animation:shake 0.3s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
  .driver-empty {
    margin-top:18px;
    background:rgba(255,248,236,0.95);
    color:var(--ink);
    border-radius:8px;
    padding:18px 16px;
    text-align:center;
    box-shadow:0 6px 0 rgba(0,0,0,0.18);
  }
  .driver-empty strong { display:block; font-size:18px; margin-bottom:6px; }
  .driver-empty span { color:rgba(31,58,95,0.72); font-size:12px; line-height:1.4; font-weight:700; }

  /* ---- loading ---- */
  #loading { align-items:center; justify-content:center; text-align:center; gap:14px; }
  #loading .spin { width:52px; height:52px; border:5px solid #2a3350; border-top-color:var(--accent); border-radius:50%; animation:sp 0.9s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  #loading .lt { font-size:15px; opacity:0.85; }

  /* ---- play ---- */
  #play { }
  #gameCanvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #hud {
    position:absolute;
    top:max(30px, calc(env(safe-area-inset-top) + 12px));
    right:max(18px, env(safe-area-inset-right));
    display:flex;
    justify-content:flex-end;
    pointer-events:none;
    z-index:2;
  }
  #hud > div { text-align:right; }
  #hud .score { font-size:26px; font-weight:bold; }
  #hud .combo { font-size:20px; color:var(--l1); font-weight:bold; }
  #hud .acc { font-size:13px; opacity:0.7; }
  #quit {
    position:absolute;
    top:max(78px, calc(env(safe-area-inset-top) + 56px));
    right:max(14px, env(safe-area-inset-right));
    background:rgba(0,0,0,0.4);
    border:1px solid #445;
    color:var(--text);
    border-radius:50%;
    width:34px;
    height:34px;
    font-size:15px;
    cursor:pointer;
    z-index:3;
  }

  /* ---- result ---- */
  #result { align-items:center; justify-content:center; text-align:center; gap:6px; padding:20px; }
  #result .rank { font-size:96px; font-weight:bold; line-height:1; margin-bottom:4px; }
  #result h2 { font-size:22px; letter-spacing:1px; }
  #result .rb { font-size:12px; color:var(--accent); margin-bottom:12px; }
  #result .stat { font-size:15px; opacity:0.9; line-height:1.9; }
  #result .fc { color:var(--l1); font-weight:bold; letter-spacing:2px; margin:6px 0; }
  #result .unlock { color:var(--l2); font-weight:bold; letter-spacing:1px; font-size:18px; margin:12px 0 4px; }
  .btn { background:var(--accent); color:#fff; border:none; font-size:16px; font-weight:bold; padding:11px 30px; border-radius:26px; cursor:pointer; margin:6px; letter-spacing:1px; }
  .btn.ghost { background:transparent; border:2px solid #556; }
  .keys { font-size:12px; opacity:0.5; margin-top:10px; text-align:center; }
  kbd { background:#333; border-radius:4px; padding:1px 6px; font-family:monospace; font-size:11px; border:1px solid #555; }
</style>
</head>
<body>
<a class="map-link" href="../home.html">MAP</a>

<!-- SONG SELECT -->
<div id="select" class="screen">
  <div class="driver-shell">
    <header class="driver-head">
      <div class="driver-face"><img src="../assets/characters/dad-face.png" alt=""></div>
      <div>
        <div class="driver-kicker">DRIVER MODE</div>
        <h1>Driver's Seat</h1>
        <div class="sub" id="driverSub">Completed mixtape cuts only.</div>
      </div>
      <div class="driver-stats">
        <strong id="driverSongCount">0</strong>
        <span>songs</span>
      </div>
    </header>
    <div class="driver-scroll">
      <div class="driver-empty hidden" id="driverEmpty">
        <strong>Locked</strong>
        <span>Complete a radio song in Runner to add it here.</span>
      </div>
      <div id="songGrid"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div id="loading" class="screen hidden">
  <div class="spin"></div>
  <div class="lt" id="loadText">Building the chart…</div>
  <button class="btn ghost hidden" id="loadBack">SONG LIST</button>
</div>

<!-- PLAY -->
<div id="play" class="screen hidden">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div><div class="score" id="hScore">0</div><div class="acc" id="hAcc">100%</div><div class="combo" id="hCombo"></div></div>
  </div>
  <button id="quit">✕</button>
</div>

<!-- RESULT -->
<div id="result" class="screen hidden">
  <div class="rank" id="rRank">A</div>
  <h2 id="rSong"></h2>
  <div class="rb" id="rBand"></div>
  <div class="fc hidden" id="rFC">★ FULL COMBO ★</div>
  <div class="stat" id="rStats"></div>
  <div class="unlock hidden" id="rUnlock"></div>
  <div>
    <button class="btn" id="rRetry">RETRY</button>
    <button class="btn ghost" id="rBack">SONG LIST</button>
  </div>
</div>

<script src="../save.js"></script>
<script>
"use strict";
// ============================================================
// TAP TRIP — a 3-lane Tap-Tap-Revenge-style rhythm game that
// reuses Road Trip Runner's songs. Charts are generated from the
// audio in-browser (multiband onset detection), so every song
// is instantly playable. Standalone at /tap/.
// ============================================================

// roundRect fallback for browsers that lack it (keeps the render loop alive)
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
    r = Math.min(r || 0, Math.abs(w) / 2, Math.abs(h) / 2);
    this.moveTo(x + r, y);
    this.arcTo(x + w, y, x + w, y + h, r); this.arcTo(x + w, y + h, x, y + h, r);
    this.arcTo(x, y + h, x, y, r); this.arcTo(x, y, x + w, y, r); this.closePath();
  };
}
const $ = (id) => document.getElementById(id);
const screens = { select: $("select"), loading: $("loading"), play: $("play"), result: $("result") };
function show(name) { for (const k in screens) screens[k].classList.toggle("hidden", k !== name); }

// SAVE — the shared player profile lives in ../save.js (global `Save`,
// localStorage "rtr_save"). Difficulty unlocks, settings, collected songs,
// miles, cars all flow through it. Loaded before this script.
const UNLOCK_RULE = Save.UNLOCK_RULE;
let DIFFICULTY = "easy";
const DIFF = { // spacing: min gap in the main tap stream · simul: chance of extra chord notes (Hard)
  easy:   { spacing: 0.32,  k: 1.5, simul: 0 },
  medium: { spacing: 0.20,  k: 1.4, simul: 0 },
  hard:   { spacing: 0.135, k: 1.3, simul: 0.30 },
};
const mkNote = (t, lane, hold) => ({ t, lane, hold, hit: false, judged: false, headHit: false, holding: false, done: false });
const LANES = 3;
const LANE_COLOR = ["#e94560", "#ffd166", "#4ec3c7"];
const LANE_RGB = LANE_COLOR.map((hex) => ({
  r: parseInt(hex.slice(1, 3), 16),
  g: parseInt(hex.slice(3, 5), 16),
  b: parseInt(hex.slice(5, 7), 16),
}));
const LEAD = 1.5;            // seconds a note is visible before its hit time
// timing windows (s). Touch input has more latency + less precision than a
// keyboard, so phones/tablets get noticeably more forgiving windows.
const IS_TOUCH = matchMedia("(pointer: coarse)").matches;
const TOUCH_RENDER_DPR = 1.25;
const HOLD_TRAIL_STEPS = IS_TOUCH ? 6 : 16;
const W_PERFECT = IS_TOUCH ? 0.070 : 0.045;
const W_GOOD    = IS_TOUCH ? 0.140 : 0.095;
const W_MISS    = IS_TOUCH ? 0.180 : 0.130;
const ACC_GOOD_WEIGHT = 0.75;
const COUNT_IN_SECONDS = 1.6;
const MAX_REASONABLE_OUTPUT_LATENCY = 0.75;
const DRIVER_MILE_SCORE_UNIT = 7000;
const DRIVER_MILE_DIFF_MULT = { easy: 0.7, medium: 1, hard: 1.25 };
const DRIVER_MILE_RANK_MULT = { D: 0, C: 0.35, B: 0.65, A: 0.9, S: 1.1 };
const DRIVER_MILE_CAP = { easy: 18, medium: 36, hard: 60 };

let audioCtx = null, songBuffer = null, source = null;
let songMeta = null, chart = [], startAt = 0, running = false, rafId = 0;
let stats = null;
let loadToken = 0;
let loadAbort = null;

function withTimeout(promise, ms, message) {
  let timer = 0;
  return new Promise((resolve, reject) => {
    timer = setTimeout(() => reject(new Error(message)), ms);
    promise.then(resolve, reject).finally(() => clearTimeout(timer));
  });
}

function setLoading(message, canBack) {
  $("loadText").textContent = message;
  $("loadBack").classList.toggle("hidden", !canBack);
}

function cancelLoad() {
  loadToken++;
  if (loadAbort) {
    try { loadAbort.abort(); } catch (e) {}
    loadAbort = null;
  }
}

async function fetchSongBuffer(url) {
  const ctrl = new AbortController();
  loadAbort = ctrl;
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.arrayBuffer();
  } catch (e) {
    if (ctrl.signal.aborted) throw new Error("network timeout");
    throw e;
  } finally {
    clearTimeout(timer);
    if (loadAbort === ctrl) loadAbort = null;
  }
}

async function resumeAudioBriefly(ms) {
  if (!audioCtx || audioCtx.state === "running") return;
  await withTimeout(audioCtx.resume().catch(() => {}), ms, "audio warm-up timeout").catch(() => {});
}

// ---------- audio hardware warm-up ----------
// Safari lazily powers up its audio pipeline on the FIRST real playback (a
// multi-second spin-up). Because our note clock keeps advancing during that
// spin-up, the music comes out several seconds late and desynced. Priming the
// context with a silent buffer forces the hardware to initialize up front, so
// the scheduled song start is actually honored. Harmless on Chrome.
let audioWarmed = false;
function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function warmAudio() {
  ensureCtx();
  audioCtx.resume().catch(() => {}); // Safari re-suspends on tab blur; keep it hot
  if (audioWarmed) return;
  try {
    const len = Math.max(1, Math.round(audioCtx.sampleRate * 0.05));
    const b = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const s = audioCtx.createBufferSource();
    s.buffer = b; s.connect(audioCtx.destination); s.start(0);
    audioWarmed = true;
  } catch (e) {}
}
// Prime on the very first user interaction so the pipeline is hot before the
// player ever picks a song (capture so it runs before the click handlers).
["pointerdown", "touchstart", "keydown"].forEach((ev) =>
  window.addEventListener(ev, warmAudio, { passive: true, capture: true }));

// ---------- metadata / song select ----------
let COLLECTED = Save.collectedSet(); // songs collected in the Runner show up here
let META = [];
let expandedSong = null;

fetch("../radio/stations.json").then((r) => r.json()).then((d) => {
  for (const era of ["90s", "00s", "70s", "80s"]) {
    const tracks = (d.stations[era] && d.stations[era].tracks) || [];
    for (const t of tracks) META.push({ era, ...t });
  }
  renderGrid();
}).catch((e) => { $("loadText").textContent = "Could not load song list."; });

function coverURL(m) { return "../radio/covers/" + m.era + "/" + encodeURIComponent(m.file.replace(/\.[^.]+$/, "")) + ".jpg"; }
function songURL(m) { return "../radio/music/" + m.era + "/" + encodeURIComponent(m.file); }
function songKey(m) { return m.era + "|" + m.file; }

const ERA_LABEL = { "90s": "THE '90s · The Dirt", "00s": "THE '00s · The Blender", "80s": "THE '80s · The Razor", "70s": "THE '70s · The Wax Museum" };
const DIFF_LABEL = { easy: "EASY", medium: "MEDIUM", hard: "HARD" };
function renderGrid() {
  COLLECTED = Save.collectedSet();
  const host = $("songGrid");
  host.innerHTML = "";
  const playable = META.filter((m) => COLLECTED.has(songKey(m)));
  if (expandedSong && !COLLECTED.has(expandedSong)) expandedSong = null;
  $("driverSongCount").textContent = playable.length;
  $("driverSub").textContent = playable.length
    ? "Your mixtape is ready."
    : "Complete a radio song in Runner.";
  $("driverEmpty").classList.toggle("hidden", playable.length > 0);
  for (const era of ["90s", "00s", "80s", "70s"]) {
    const tracks = playable.filter((m) => m.era === era);
    if (!tracks.length) continue;
    const hdr = document.createElement("div");
    hdr.className = "decade"; hdr.textContent = ERA_LABEL[era] || era;
    host.appendChild(hdr);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const m of tracks) {
      const id = songKey(m);
      const collected = COLLECTED.has(id);
      const el = document.createElement("div");
      el.className = "song" + (expandedSong === id ? " open" : "");
      el.innerHTML =
        '<img class="art" alt="" src="' + coverURL(m) + '" onerror="this.style.visibility=\'hidden\'">' +
        (collected ? '<span class="star">★</span>' : '') +
        '<div class="meta"><div class="t"></div><div class="b"></div>' +
        (m.genre ? '<span class="tag"></span>' : '') +
        '</div>';
      el.querySelector(".t").textContent = m.song;
      el.querySelector(".b").textContent = m.band;
      if (m.genre) el.querySelector(".tag").textContent = m.genre;
      el.addEventListener("click", () => {
        expandedSong = expandedSong === id ? null : id;
        renderGrid();
      });
      if (expandedSong === id) el.appendChild(renderSongDiffs(m));
      grid.appendChild(el);
    }
    host.appendChild(grid);
  }
}
function renderSongDiffs(m) {
  const wrap = document.createElement("div");
  wrap.className = "diffs";
  const id = songKey(m);
  for (const d of ["easy", "medium", "hard"]) {
    const unlocked = Save.hasSongDiff(id, d);
    const best = Save.songBest(id, d);
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "diffpick " + d + (unlocked ? " unlocked" : " locked");
    const rule = Object.entries(UNLOCK_RULE).find(([, r]) => r.next === d);
    const small = best ? "best " + best : (unlocked ? "play" : (rule ? "get " + rule[1].need + " on " + DIFF_LABEL[rule[0]].toLowerCase() : "locked"));
    btn.innerHTML = DIFF_LABEL[d] + (unlocked ? "" : " 🔒") + '<span class="small"></span>';
    btn.querySelector(".small").textContent = small;
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      if (!unlocked) {
        btn.classList.add("shake");
        setTimeout(() => btn.classList.remove("shake"), 320);
        return;
      }
      startSong(m, d);
    });
    wrap.appendChild(btn);
  }
  return wrap;
}

// ============================================================
// CHART GENERATION — multiband onset detection
// ============================================================
function lowpass(sig, sr, fc) {
  const dt = 1 / sr, RC = 1 / (2 * Math.PI * fc), a = dt / (RC + dt);
  const y = new Float32Array(sig.length); let p = 0;
  for (let i = 0; i < sig.length; i++) { p += a * (sig[i] - p); y[i] = p; }
  return y;
}
function highpass(sig, sr, fc) {
  const dt = 1 / sr, RC = 1 / (2 * Math.PI * fc), a = RC / (RC + dt);
  const y = new Float32Array(sig.length); let py = 0, px = 0;
  for (let i = 0; i < sig.length; i++) { const x = sig[i]; py = a * (py + x - px); y[i] = py; px = x; }
  return y;
}
function bandOnsets(sig, sr, lane, minGap, kThresh, benv, gate) {

function generateChart(buf) {
  const sr = buf.sampleRate, n = buf.length;
  const a0 = buf.getChannelData(0), a1 = buf.numberOfChannels > 1 ? buf.getChannelData(1) : a0;
  const mono = new Float32Array(n);
  let peak = 1e-6;
  for (let i = 0; i < n; i++) { const v = 0.5 * (a0[i] + a1[i]); mono[i] = v; if (Math.abs(v) > peak) peak = Math.abs(v); }

  for (let i = 0; i < n; i++) mono[i] *= g; // normalize

  // silence, fades, or trailing dead air (the source of phantom end-of-song notes)
  const hopS = 0.011, hop = Math.max(1, Math.round(sr * hopS));
  const nF = Math.floor(n / hop);
  const benv = new Float32Array(nF);
  for (let f = 0; f < nF; f++) { let s = 0; const st = f * hop; for (let i = 0; i < hop; i++) { const v = mono[st + i] || 0; s += v * v; } benv[f] = Math.sqrt(s / hop); }

  const low = lowpass(mono, sr, 150);
  const high = highpass(mono, sr, 4500);
  const mid = highpass(lowpass(mono, sr, 3000), sr, 300);

  const D = DIFF[DIFFICULTY];
  const lowOn  = bandOnsets(low,  sr, 0, 0.16, D.k + 0.1,  benv, gate);
  const midOn  = bandOnsets(mid,  sr, 1, 0.13, D.k + 0.2,  benv, gate);
  const highOn = bandOnsets(high, sr, 2, 0.10, D.k + 0.35, benv, gate);
  const notes = [...lowOn, ...midOn, ...highOn].sort((a, b) => a.t - b.t);

  // primary single-note tap stream — density set by difficulty
  const kept = [];
  for (const nt of notes) {
    const prev = kept[kept.length - 1];
    if (!prev || nt.t - prev.t >= D.spacing) kept.push(nt);
    else if (nt.s > prev.s * 1.3) kept[kept.length - 1] = nt;
  }

  // HOLDS = a sustained bass note: a gap between bass hits where energy stays up.
  // Placed in the left lane and capped, so they're a deliberate feature. The
  // melody notes in the other lanes during the hold become the taps you play
  // over it — Guitar-Hero-style, and it scales naturally with difficulty.
  // A held note = energy stays up but there are NO new attacks (low spectral
  // flux) for a stretch. Detect those runs from the broadband envelope.
  const bodf = new Float32Array(nF);
  for (let f = 1; f < nF; f++) { const d = benv[f] - benv[f - 1]; bodf[f] = d > 0 ? d : 0; }

  const fs = Array.from(bodf).filter((v) => v > 0).sort((a, b) => a - b);
  const fluxThresh = (fs.length ? fs[Math.floor(fs.length * 0.5)] : 0) * 1.3;
  let zones = [];
  let zStart = -1;
  for (let f = 1; f < nF; f++) {
    const sustain = benv[f] > gate * 1.05 && sm[f] < fluxThresh;
    if (sustain) { if (zStart < 0) zStart = f; }

      const dur = (f - zStart) * hopS;
      if (dur >= 0.6) zones.push({ t: zStart * hopS + 0.04, dur: Math.min(dur - 0.1, 2.2) });
      zStart = -1;
    }
  }
  if (zStart >= 0) { const dur = (nF - zStart) * hopS; if (dur >= 0.6) zones.push({ t: zStart * hopS + 0.04, dur: Math.min(dur - 0.1, 2.2) }); }
  zones = zones.filter((z) => z.t > 0.4 && z.t + z.dur <= endT + 0.2);
  const maxHolds = Math.max(2, Math.round(endT / 8));
  zones.sort((a, b) => b.dur - a.dur);
  const holds = zones.slice(0, maxHolds).sort((a, b) => a.t - b.t).map((z) => mkNote(z.t, 0, z.dur));
  const blockedByHold = (t, lane) => lane === 0 && holds.some((h) => t > h.t - 0.06 && t < h.t + h.hold + 0.06);

  // tap candidates: the primary stream, plus occasional Hard chords on strong onsets
  const taps = kept.filter((nt) => nt.t > 0.4 && nt.t <= endT).map((nt) => ({ t: nt.t, lane: nt.lane, s: nt.s }));
  if (D.simul > 0) {
    for (const o of notes) {
      if (o.s < gate * 0.6) continue;
      if (kept.some((k) => k.lane !== o.lane && Math.abs(k.t - o.t) < 0.04) && Math.random() < D.simul)
        taps.push({ t: o.t, lane: o.lane, s: o.s });
    }
  }
  taps.sort((a, b) => a.t - b.t || b.s - a.s);

  // assemble: holds own the left lane; taps fill the rest (incl. other lanes during a hold)
  const result = holds.slice();
  const laneLast = [-9, -9, -9];
  for (const tp of taps) {
    if (blockedByHold(tp.t, tp.lane)) continue;
    if (tp.t - laneLast[tp.lane] < 0.09) continue;
    result.push(mkNote(tp.t, tp.lane, 0));
    laneLast[tp.lane] = tp.t;
  }
  result.sort((a, b) => a.t - b.t);
  return result;
}

async function startSong(m, diff) {
  cancelLoad();
  const token = loadToken;
  const id = songKey(m);
  if (diff && !Save.hasSongDiff(id, diff)) return;
  DIFFICULTY = diff || Save.highestSongDiff(id);
  songMeta = m;
  show("loading");
  setLoading("Loading “" + m.song + "” · " + DIFF_LABEL[DIFFICULTY] + "…", false);
  try {
    warmAudio(); // create + resume + prime the hardware inside the click gesture,
    await resumeAudioBriefly(900); // but do not let browser audio policy freeze loading
    const arr = await fetchSongBuffer(songURL(m)); // it seconds to spin up
    if (token !== loadToken) return;
    setLoading("Building the chart…", false);
    songBuffer = await withTimeout(audioCtx.decodeAudioData(arr), 20000, "decode timeout");
    if (token !== loadToken) return;
    chart = generateChart(songBuffer);
    if (!chart.length) { setLoading("No beats found — try another track.", true); return; }
    await resumeAudioBriefly(1200); // ensure running after the awaits when the browser allows it
    if (token !== loadToken) return;
    beginPlay();
  } catch (e) {
    if (token !== loadToken) return;
    setLoading("Couldn't load that one. (" + (e && e.message || e && e.name || "error") + ")", true);
    console.error(e);
  }
}

const canvas = $("gameCanvas"), ctx = canvas.getContext("2d");

function resize() {
  // Full-screen Android canvases can be enormous at native DPR. A lighter
  // touch canvas keeps the audio clock and hold input responsive.
  const dpr = Math.min(window.devicePixelRatio || 1, IS_TOUCH ? TOUCH_RENDER_DPR : 2);
  CW = canvas.clientWidth; CH = canvas.clientHeight;
  canvas.width = CW * dpr; canvas.height = CH * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fieldW = Math.min(CW, 460); fieldX = (CW - fieldW) / 2;
  laneW = fieldW / LANES;
  const tallScreen = CH / Math.max(1, CW) > 1.45;
  horizonX = CW / 2;
  horizonY = CH * (tallScreen ? 0.335 : 0.40);
  const bottomSafe = IS_TOUCH ? Math.max(118, CH * 0.18) : Math.max(78, CH * 0.12);
  targetY = Math.min(CH * (IS_TOUCH ? 0.755 : 0.795), CH - bottomSafe);

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

};

  return 0.16 + Math.pow(clamp01(p), 1.12) * 0.84;
}

}

}

    x: laneCenterX(lane, onRoad),
    y: horizonY + (targetY - horizonY) * yEase + overrun * Math.max(70, CH - targetY),
    scale: 0.36 + Math.pow(onRoad, 1.85) * 0.64 + overrun * 0.32,

}
function drawPlayfieldShade() {

  shade.addColorStop(0, "rgba(9,12,26,0.10)");
  shade.addColorStop(0.48, "rgba(9,12,26,0.34)");
  shade.addColorStop(1, "rgba(9,12,26,0.62)");

  ctx.moveTo(laneEdgeX(0, 0), horizonY);
  ctx.lineTo(laneEdgeX(LANES, 0), horizonY);

  const hitAge = fx ? performance.now() - fx.t : 999;
  const hit = clamp01(1 - hitAge / 280);
  const r = laneW * (0.27 + pulse * 0.03 + hit * 0.02);

  if (pressed || pulse > 0 || hit > 0) {
    const glow = ctx.createRadialGradient(cx, targetY, r * 0.2, cx, targetY, r * (2.1 + pulse));
    glow.addColorStop(0, laneRGBA(lane, 0.34 + pulse * 0.20 + hit * 0.16));

  let a = clamp(startProgress, 0, 1.08);

  if (a > b) { const tmp = a; a = b; b = tmp; }

  const baseAlpha = active ? 0.88 : (done ? 0.22 : 0.52);
  const steps = HOLD_TRAIL_STEPS;
  ctx.save();
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.shadowColor = LANE_COLOR[lane];
  ctx.shadowBlur = IS_TOUCH ? 0 : (active ? 14 : 7);
  for (let i = 0; i < steps; i++) {
    const p0 = a + (b - a) * (i / steps);
    const p1 = a + (b - a) * ((i + 1) / steps);
    const pt0 = notePoint(lane, p0);
    const pt1 = notePoint(lane, p1);
    const road = (pt0.road + pt1.road) / 2;
    const alpha = baseAlpha * Math.min(pt0.alpha, pt1.alpha) * (0.46 + road * 0.44);
    if (alpha <= 0.01) continue;

    ctx.lineWidth = laneW * (0.08 + Math.pow(road, 1.2) * 0.14);
    ctx.strokeStyle = laneRGBA(lane, alpha * 0.55);
    ctx.beginPath();
    ctx.moveTo(pt0.x, pt0.y);
    ctx.lineTo(pt1.x, pt1.y);
    ctx.stroke();

    if (!IS_TOUCH) {
      ctx.shadowBlur = 0;
      ctx.lineWidth = laneW * (0.032 + Math.pow(road, 1.3) * 0.055);
      ctx.strokeStyle = "rgba(255,255,255," + (alpha * 0.20) + ")";

      ctx.lineTo(pt1.x, pt1.y);
      ctx.stroke();
      ctx.shadowBlur = active ? 14 : 7;
    }

    ctx.closePath();
    ctx.fill();

    // road edge glints and faint surface seams
    for (const side of [-1, 1]) {
      ctx.strokeStyle = "rgba(255,245,204,0.09)";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(vx + side * CW * 0.06, hY + 3);
      ctx.lineTo(vx + side * CW * 0.58, CH);
      ctx.stroke();
    }
    ctx.strokeStyle = "rgba(255,255,255,0.035)";
    ctx.lineWidth = 1;
    for (let i = 0; i < 9; i++) {
      const z = (i / 9 + this.dash * 0.55) % 1;
      const y = this.roadY(hY, z);
      const half = this.roadHalf(z);
      ctx.beginPath();
      ctx.moveTo(vx - half * 0.82, y);
      ctx.lineTo(vx + half * 0.82, y);
      ctx.stroke();
    }

    // center dashes scrolling toward you (sense of motion)
    ctx.strokeStyle = "rgba(255,238,174,0.13)";
    ctx.lineCap = "round";
    for (let k = 0; k < 8; k++) {
      const z = (k / 8 + this.dash) % 1;
      const y = this.roadY(hY, z);
      const len = 8 + Math.pow(z, 1.25) * 34;
      ctx.lineWidth = 1.5 + Math.pow(z, 1.2) * 7;
      ctx.beginPath();
      ctx.moveTo(vx, y);
      ctx.lineTo(vx, y + len);
      ctx.stroke();
    }
  },
  drawGuardrails(hY, vx) {
    ctx.save();
    for (const side of [-1, 1]) {
      ctx.strokeStyle = "rgba(180,194,198,0.10)";
      ctx.lineWidth = 1.4;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const z = i / 9;
        const y = this.roadY(hY, z);
        const x = vx + side * (this.roadHalf(z) + CW * (0.035 + z * 0.06));
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();

      for (let k = 0; k < 8; k++) {
        const z = (k / 8 + this.dash * 0.8) % 1;
        if (z < 0.05) continue;
        const y = this.roadY(hY, z);
        const postH = 8 + z * 34;
        const x = vx + side * (this.roadHalf(z) + CW * (0.04 + z * 0.07));
        ctx.fillStyle = "rgba(198,206,202," + (0.06 + z * 0.10) + ")";
        ctx.fillRect(x - 2, y - postH, 4, postH);
      }
    }
    ctx.restore();
  },
  drawVehicle(c, hY, vx) {
    const p = c.z; if (p < 0 || p > 1.18) return;
    const z = clamp(p, 0, 1.12);
    const road = clamp01(z);
    const overrun = Math.max(0, z - 1);
    const laneWander = Math.sin(c.seed + performance.now() * 0.00045 + p * 2.6) * 0.016 * (0.35 + road);
    const scale = 0.12 + z * z * 1.18;
    const y = this.roadY(hY, road) + overrun * (CH - hY) * 0.45;
    const x = this.roadX(vx, c.lane + laneWander, road);
    const isSemi = c.kind === "semi";
    const isPickup = c.kind === "pickup";
    const w = (isSemi ? 78 : isPickup ? 62 : 50) * scale * 1.72;
    const h = (isSemi ? 96 : isPickup ? 46 : 36) * scale * 1.72;
    const a = Math.min(0.72, (0.28 + road * 0.34) * c.tone);
    const body = "hsla(" + c.hue + ",28%," + (30 + road * 18) + "%," + a + ")";
    const bodyLight = "hsla(" + c.hue + ",32%," + (48 + road * 16) + "%," + (a * 0.86) + ")";
    const dark = "rgba(12,15,23," + (0.22 + road * 0.30) + ")";
    const glass = "rgba(192,222,230," + (a * 0.36) + ")";
    const lightAlpha = Math.min(0.95, a * 1.7 * c.lights);
    const img = this.assets[c.kind];
    if (img && img.complete && img.naturalWidth > 0) {
      this.drawVehicleAsset(img, c.kind, x, y, w, h, road);
      return;
    }

    ctx.save();
    ctx.shadowColor = "rgba(0,0,0,0.45)";
    ctx.shadowBlur = 5 + z * 10;
    ctx.shadowOffsetY = 2 + z * 4;
    ctx.fillStyle = "rgba(0,0,0," + (0.10 + z * 0.12) + ")";
    ctx.beginPath(); ctx.ellipse(x, y + 2 * scale, w * 0.55, h * 0.16, 0, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

    if (isSemi) {
      const trailerH = h * 0.72;
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.roundRect(x - w * 0.48, y - h, w * 0.96, trailerH, 3 * scale + 2); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255," + (a * 0.13) + ")";
      ctx.fillRect(x - w * 0.40, y - h * 0.88, w * 0.80, Math.max(1, h * 0.018));
      ctx.fillRect(x - w * 0.40, y - h * 0.68, w * 0.80, Math.max(1, h * 0.018));

      ctx.fillStyle = bodyLight;
      ctx.beginPath(); ctx.roundRect(x - w * 0.40, y - h * 0.31, w * 0.80, h * 0.28, 3 * scale + 1); ctx.fill();
      ctx.fillStyle = glass;
      ctx.fillRect(x - w * 0.28, y - h * 0.25, w * 0.20, h * 0.075);
      ctx.fillRect(x + w * 0.08, y - h * 0.25, w * 0.20, h * 0.075);
      ctx.fillStyle = dark;
      ctx.fillRect(x - w * 0.44, y - h * 0.04, w * 0.17, Math.max(2, h * 0.085));
      ctx.fillRect(x + w * 0.27, y - h * 0.04, w * 0.17, Math.max(2, h * 0.085));
      ctx.fillStyle = "rgba(240,82,66," + lightAlpha + ")";
      ctx.fillRect(x - w * 0.43, y - h * 0.18, w * 0.12, Math.max(2, h * 0.07));
      ctx.fillRect(x + w * 0.31, y - h * 0.18, w * 0.12, Math.max(2, h * 0.07));
    } else {
      ctx.fillStyle = body;
      ctx.beginPath(); ctx.roundRect(x - w / 2, y - h * 0.66, w, h * 0.48, 4 * scale + 2); ctx.fill();
      ctx.fillStyle = bodyLight;
      ctx.beginPath(); ctx.roundRect(x - w * 0.34, y - h, w * 0.68, h * 0.46, 4 * scale + 1); ctx.fill();

      if (isPickup) {
        ctx.fillStyle = "hsla(" + c.hue + ",22%," + (26 + road * 13) + "%," + (a * 0.80) + ")";
        ctx.beginPath(); ctx.roundRect(x - w * 0.47, y - h * 0.64, w * 0.34, h * 0.25, 2 * scale + 1); ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255," + (a * 0.15) + ")";
        ctx.lineWidth = Math.max(1, scale * 1.5);
        ctx.beginPath(); ctx.moveTo(x - w * 0.43, y - h * 0.47); ctx.lineTo(x - w * 0.16, y - h * 0.47); ctx.stroke();
      }
      ctx.fillStyle = glass;
      ctx.fillRect(x - w * 0.22, y - h * 0.82, w * 0.44, h * 0.12);
      ctx.fillStyle = "rgba(245,230,150," + (a * 0.22) + ")";
      ctx.fillRect(x - w * 0.10, y - h * 0.49, w * 0.20, Math.max(1, h * 0.035));
      ctx.fillStyle = "rgba(238,238,218," + (a * 0.44) + ")";
      ctx.fillRect(x - w * 0.11, y - h * 0.31, w * 0.22, Math.max(1, h * 0.045));
      ctx.fillStyle = "rgba(240,82,66," + lightAlpha + ")";
      ctx.fillRect(x - w * 0.43, y - h * 0.31, w * 0.14, Math.max(2, h * 0.08));
      ctx.fillRect(x + w * 0.29, y - h * 0.31, w * 0.14, Math.max(2, h * 0.08));
      ctx.fillStyle = dark;
      ctx.fillRect(x - w * 0.39, y - h * 0.14, w * 0.17, Math.max(2, h * 0.095));
      ctx.fillRect(x + w * 0.22, y - h * 0.14, w * 0.17, Math.max(2, h * 0.095));
    }
    ctx.restore();
  },
  drawVehicleAsset(img, kind, x, y, w, h, road) {
    const aspect = img.naturalWidth / img.naturalHeight;
    const drawH = h * (kind === "semi" ? 1.08 : 1.42);
    const drawW = Math.max(w, drawH * aspect);
    const alpha = Math.min(0.94, 0.58 + road * 0.34);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = "rgba(0,0,0,0.36)";
    ctx.shadowBlur = 4 + road * 8;
    ctx.shadowOffsetY = 2 + road * 4;
    ctx.drawImage(img, x - drawW / 2, y - drawH, drawW, drawH);
    ctx.restore();
  },
};

let hitFx = [];     // {lane, t} lane flashes
let judgeFx = null; // {text, color, t}
function beginPlay() {
  show("play");
  resize();
  stats = { score: 0, combo: 0, maxCombo: 0, perfect: 0, good: 0, miss: 0, mult: 1, total: chart.length };
  for (const nt of chart) { nt.hit = false; nt.judged = false; nt.headHit = false; nt.holding = false; nt.done = false; }
  hitFx = []; judgeFx = null; laneDown = [false, false, false]; lastLoopMs = 0;
  Traffic.init();
  // count-in: start audio a bit ahead so the first notes fall in
  source = audioCtx.createBufferSource();
  source.buffer = songBuffer;
  const gain = audioCtx.createGain(); gain.gain.value = 0.92;
  source.connect(gain).connect(audioCtx.destination);
  startAt = audioCtx.currentTime + COUNT_IN_SECONDS;
  source.start(startAt);
  source.onended = () => { if (running) endSong(); };
  running = true;
  loop();
}
// song clock, compensated for how late the sound actually leaves the speakers
function audioOutputLatency() {
  const rawLatency = Number(audioCtx && audioCtx.outputLatency);
  if (!Number.isFinite(rawLatency) || rawLatency <= 0) return 0;

  // Some Android Chrome builds report this value in milliseconds. Bound it
  // before using it as seconds so the count-in cannot jump into the hundreds.
  const seconds = rawLatency > 1 ? rawLatency / 1000 : rawLatency;
  return seconds <= MAX_REASONABLE_OUTPUT_LATENCY ? seconds : 0;
}
function songTime() { return (audioCtx.currentTime - startAt) - audioOutputLatency(); }

let lastLoopMs = 0;
function loop() {
  if (!running) return;
  const now = performance.now();
  const dt = lastLoopMs ? Math.min(0.05, (now - lastLoopMs) / 1000) : 0.016;
  lastLoopMs = now;
  const t = songTime();
  // auto-miss heads that passed the window
  for (const nt of chart) {
    if (!nt.judged && t - nt.t > W_MISS) { nt.judged = true; registerMiss(); if (nt.hold > 0) nt.done = true; }
  }
  // sustain scoring: award while held, complete at the end, break on early release
  for (const nt of chart) {
    if (nt.hold <= 0 || !nt.headHit || nt.done) continue;
    if (t >= nt.t + nt.hold) { completeHold(nt); continue; }
    if (laneDown[nt.lane]) stats.score += 180 * stats.mult * dt;
    else breakHold(nt);
  }
  Traffic.update(dt);
  draw(t);
  const last = chart[chart.length - 1];
  const lastEnd = last.t + (last.hold || 0);
  if (t > lastEnd + 1.3) { endSong(); return; }
  rafId = requestAnimationFrame(loop);
}

function draw(t) {
  ctx.clearRect(0, 0, CW, CH);
  Traffic.draw(); // Dad Mode: hazy highway behind the lanes
  drawPlayfieldShade();

  const lanePulse = [0, 0, 0];
  for (const nt of chart) {
    if (nt.done || (nt.judged && nt.hit)) continue;
    const dt = nt.t - t;
    if (dt > -W_MISS && dt < 0.42) {
      lanePulse[nt.lane] = Math.max(lanePulse[nt.lane], clamp01(1 - Math.abs(dt) / 0.42));
    }
  }

  // lane ribbons + target rings
  for (let L = 0; L < LANES; L++) {
    const cx = laneCenterX(L, 1);
    const fx = hitFx.find((h) => h.lane === L);
    if (laneDown[L]) drawLaneRibbon(L, 0.07);
    if (fx) {
      const a = Math.max(0, 1 - (performance.now() - fx.t) / 180);
      drawLaneRibbon(L, 0.06 + a * 0.12);
    }
    drawTarget(L, cx, lanePulse[L], fx);
  }

  // target timing line
  ctx.strokeStyle = "rgba(255,255,255,0.22)"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(fieldX, targetY); ctx.lineTo(fieldX + fieldW, targetY); ctx.stroke();

  // notes (taps + holds)
  for (const nt of chart) {
    const isHold = nt.hold > 0;
    if (!isHold) {
      if (nt.judged && nt.hit) continue;
      if (nt.judged && !nt.hit && t - nt.t > 0.2) continue;
    } else if (nt.done && t - (nt.t + nt.hold) > 0.15) continue;
    const headProgress = 1 - (nt.t - t) / LEAD;
    const endProgress = isHold ? 1 - (nt.t + nt.hold - t) / LEAD : headProgress;
    if (Math.max(headProgress, endProgress) < -0.08 || Math.min(headProgress, endProgress) > 1.18) continue;
    const head = notePoint(nt.lane, headProgress);
    const r = laneW * 0.255 * head.scale;
    // hold tail
    if (isHold) {
      const holdEnd = nt.headHit && !nt.done ? 1 : headProgress;
      drawHoldTrail(nt.lane, endProgress, holdEnd, nt.holding, nt.done);
      if (nt.holding) { // pulsing glow at the line while sustaining
        const cx = laneCenterX(nt.lane, 1);
        ctx.beginPath(); ctx.arc(cx, targetY, laneW * 0.34, 0, Math.PI * 2);
        ctx.fillStyle = LANE_COLOR[nt.lane];
        ctx.globalAlpha = 0.45 + 0.3 * Math.abs(Math.sin(performance.now() / 90));
        ctx.fill(); ctx.globalAlpha = 1;
      }
    }
    // head (hidden once a hold's head is grabbed)
    if (headProgress <= 1.12 && headProgress >= -0.06 && !(isHold && nt.headHit)) {
      if (!isHold && headProgress > 0.16 && headProgress < 1.04) {
        const trail = notePoint(nt.lane, headProgress - 0.11);
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineWidth = Math.max(4, r * 0.78);
        const streak = ctx.createLinearGradient(trail.x, trail.y, head.x, head.y);
        streak.addColorStop(0, laneRGBA(nt.lane, 0));
        streak.addColorStop(1, laneRGBA(nt.lane, 0.25 * head.alpha));
        ctx.strokeStyle = streak;
        ctx.beginPath();
        ctx.moveTo(trail.x, trail.y);
        ctx.lineTo(head.x, head.y);
        ctx.stroke();
        ctx.restore();
      }
      drawNoteHead(nt.lane, head.x, head.y, r, head.alpha, head.road, nt.judged && !isHold);
    }
  }

  // count-in
  if (t < 0) {
    const n = Math.min(Math.ceil(COUNT_IN_SECONDS), Math.max(1, Math.ceil(-t)));
    ctx.fillStyle = "#fff"; ctx.font = "bold 64px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(n, CW / 2, CH * 0.42);
    ctx.font = "16px sans-serif"; ctx.fillText("GET READY", CW / 2, CH * 0.5);
    ctx.textAlign = "left";
  }
  // judgment flash
  if (judgeFx) {
    const a = Math.max(0, 1 - (performance.now() - judgeFx.t) / 500);
    if (a > 0) {
      ctx.globalAlpha = a; ctx.fillStyle = judgeFx.color; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(judgeFx.text, CW / 2, targetY - 60); ctx.textAlign = "left"; ctx.globalAlpha = 1;
    }
  }
  // live HUD
  $("hScore").textContent = Math.round(stats.score).toLocaleString();
  $("hCombo").textContent = stats.combo > 1 ? stats.combo + "x  ·  " + stats.mult + "×" : "";
  const done = stats.perfect + stats.good + stats.miss;
  $("hAcc").textContent = done ? Math.round(((stats.perfect + stats.good * ACC_GOOD_WEIGHT) / done) * 100) + "%" : "100%";
}

// ---------- input ----------
let laneDown = [false, false, false];
function pressLane(L) {
  if (!running) return;
  laneDown[L] = true;
  const t = songTime();
  // nearest unjudged note in this lane within the good window
  let best = null, bestDt = 1e9;
  for (const nt of chart) {
    if (nt.judged || nt.lane !== L) continue;
    const dt = Math.abs(nt.t - t);
    if (dt < bestDt) { bestDt = dt; best = nt; }
  }
  hitFx = hitFx.filter((h) => h.lane !== L); hitFx.push({ lane: L, t: performance.now() });
  if (best && bestDt <= W_GOOD) {
    best.judged = true; best.hit = true;
    if (bestDt <= W_PERFECT) registerHit(true); else registerHit(false);
    if (best.hold > 0) { best.headHit = true; best.holding = true; } // begin the sustain
  }
  // taps with no note in window are ignored (no penalty) — keeps it forgiving
}
function releaseLane(L) {
  laneDown[L] = false;
  const t = songTime();
  for (const nt of chart) {
    if (nt.lane !== L || !nt.holding || nt.done) continue;
    if (t >= nt.t + nt.hold - W_GOOD) completeHold(nt); else breakHold(nt);
  }
}
function completeHold(nt) {
  nt.holding = false; nt.done = true;
  stats.score += 120 * stats.mult;
  judgeFx = { text: "HOLD!", color: "#4ec3c7", t: performance.now() };
}
function breakHold(nt) {
  nt.holding = false; nt.done = true;
  // releasing a hold early only forfeits the sustain bonus — it does NOT
  // break your streak (that's the Guitar Hero behavior)
  judgeFx = { text: "let go", color: "#ffd166", t: performance.now() };
}
function registerHit(perfect) {
  stats.combo++; stats.maxCombo = Math.max(stats.maxCombo, stats.combo);
  stats.mult = Math.min(4, 1 + Math.floor(stats.combo / 10));
  const base = perfect ? 100 : 50;
  stats.score += base * stats.mult;
  if (perfect) stats.perfect++; else stats.good++;
  judgeFx = { text: perfect ? "PERFECT" : "GOOD", color: perfect ? "#4ec3c7" : "#ffd166", t: performance.now() };
}
function registerMiss() {
  stats.miss++; stats.combo = 0; stats.mult = 1;
  judgeFx = { text: "MISS", color: "#e94560", t: performance.now() };
}

const KEY_LANE = { "f": 0, "j": 1, "k": 2, "arrowleft": 0, "arrowdown": 1, "arrowright": 2 };
document.addEventListener("keydown", (e) => {
  if (e.repeat) return;
  const L = KEY_LANE[e.key.toLowerCase()];
  if (L !== undefined) { e.preventDefault(); pressLane(L); }
  if (e.key === "Escape" && running) quitToSelect();
});
document.addEventListener("keyup", (e) => {
  const L = KEY_LANE[e.key.toLowerCase()];
  if (L !== undefined) releaseLane(L);
});
function laneOf(x) {
  if (x < fieldX || x > fieldX + fieldW) return x < CW / 2 ? 0 : 2; // outside maps to nearest side
  return Math.min(LANES - 1, Math.floor((x - fieldX) / laneW));
}
const pointerLane = {}; // pointerId -> lane, so multi-touch holds work
function releasePointer(pointerId) {
  const L = pointerLane[pointerId];
  if (L === undefined) return;
  delete pointerLane[pointerId];
  // Do not cut a lane's hold short when a second finger is still on it.
  if (!Object.values(pointerLane).includes(L)) releaseLane(L);
}
canvas.addEventListener("pointerdown", (e) => {
  e.preventDefault();
  const L = laneOf(e.clientX);
  pointerLane[e.pointerId] = L;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  pressLane(L);
}, { passive: false });
canvas.addEventListener("pointerup", (e) => {
  e.preventDefault();
  releasePointer(e.pointerId);
  try { canvas.releasePointerCapture(e.pointerId); } catch (err) {}
}, { passive: false });
canvas.addEventListener("pointercancel", (e) => releasePointer(e.pointerId));
canvas.addEventListener("lostpointercapture", (e) => releasePointer(e.pointerId));

// ---------- end / result ----------
function stopSource() { if (source) { try { source.onended = null; source.stop(); } catch (e) {} source = null; } }
function quitToSelect() { cancelLoad(); running = false; cancelAnimationFrame(rafId); stopSource(); show("select"); }
function milesForDriverResult(score, diff, rank) {
  const scoreMiles = Math.floor(Math.max(0, score) / DRIVER_MILE_SCORE_UNIT);
  const diffMult = DRIVER_MILE_DIFF_MULT[diff] || 0;
  const rankMult = DRIVER_MILE_RANK_MULT[rank] || 0;
  const cap = DRIVER_MILE_CAP[diff] || 0;
  const earned = Math.floor(scoreMiles * diffMult * rankMult);
  if (!Number.isFinite(earned) || earned <= 0) return 0;
  return Math.min(cap, earned);
}
function endSong() {
  if (!running) return;
  running = false; cancelAnimationFrame(rafId); stopSource();
  const done = stats.perfect + stats.good + stats.miss || 1;
  const acc = (stats.perfect + stats.good * ACC_GOOD_WEIGHT) / done;
  const fc = stats.miss === 0 && (stats.perfect + stats.good) > 0;
  let rank = "D";
  if (acc >= 0.95) rank = "S"; else if (acc >= 0.88) rank = "A"; else if (acc >= 0.75) rank = "B"; else if (acc >= 0.6) rank = "C";
  $("rRank").textContent = rank;
  $("rRank").style.color = rank === "S" ? "#4ec3c7" : rank === "A" ? "#ffd166" : rank === "D" ? "#e94560" : "#fff";
  $("rSong").textContent = songMeta.song;
  $("rBand").textContent = songMeta.band + " · " + DIFF_LABEL[DIFFICULTY];
  $("rFC").classList.toggle("hidden", !fc);
  const earnedMiles = milesForDriverResult(stats.score, DIFFICULTY, rank);
  const totalMiles = earnedMiles > 0 ? Save.addMiles(earnedMiles) : Save.miles;
  $("rStats").innerHTML =
    "Score <b>" + Math.round(stats.score).toLocaleString() + "</b><br>" +
    "Accuracy <b>" + Math.round(acc * 100) + "%</b><br>" +
    "Max combo <b>" + stats.maxCombo + "</b><br>" +
    "+<b>" + earnedMiles + " mi</b> earned · <b>" + totalMiles + " mi</b> banked<br>" +
    "<span style='color:#4ec3c7'>Perfect " + stats.perfect + "</span> · " +
    "<span style='color:#ffd166'>Good " + stats.good + "</span> · " +
    "<span style='color:#e94560'>Miss " + stats.miss + "</span>";
  // record the grade and unlock the next difficulty for this song if it cleared the bar
  const newDiff = Save.recordSongResult(songKey(songMeta), DIFFICULTY, rank);
  const ru = $("rUnlock");
  if (newDiff) {
    ru.textContent = "🔓 " + DIFF_LABEL[newDiff] + " UNLOCKED FOR THIS SONG!";
    ru.classList.remove("hidden");
  } else ru.classList.add("hidden");
  renderGrid();
  show("result");
}
$("quit").addEventListener("click", quitToSelect);
$("loadBack").addEventListener("click", quitToSelect);
$("rBack").addEventListener("click", () => { renderGrid(); show("select"); });
$("rRetry").addEventListener("click", () => startSong(songMeta, DIFFICULTY));
window.addEventListener("rtr-save-restored", () => {
  COLLECTED = Save.collectedSet();
  renderGrid();
});
</script>
</body>
</html>
